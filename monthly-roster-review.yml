name: ParleyMap monthly roster review

on:
  workflow_dispatch:
  schedule:
    - cron: "31 4 1 * *"

permissions:
  contents: write

concurrency:
  group: parleymap-monthly-roster-review
  cancel-in-progress: false

timeout-minutes: 25

jobs:
  monthly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Canonical truth repair
        run: node scripts/parleymap-canonical-truth-fix.cjs

      - name: Safe roster review report
        run: |
          mkdir -p data/diagnostics
          node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('data/demo.json','utf8'));const report={generatedAt:new Date().toISOString(),status:'safe_review_only',counts:{people:data.people?.length,roster:data.roster?.length,expansionRoster:data.expansionRoster?.length,appearances:data.appearances?.length},note:'Monthly roster review is intentionally review-only. It must not mass-replace people automatically.'};fs.writeFileSync('data/diagnostics/roster-current-holder-review.json',JSON.stringify(report,null,2)+'\n');fs.writeFileSync('data/diagnostics/roster-patch-candidates.json',JSON.stringify({generatedAt:report.generatedAt,status:'manual_review_required',candidates:[]},null,2)+'\n');console.log(JSON.stringify(report,null,2));"

      - name: Append summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload monthly files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-monthly-roster-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit monthly canonical review
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Review ParleyMap roster safely"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
