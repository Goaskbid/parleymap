name: ParleyMap monthly roster review

on:
  workflow_dispatch:
  schedule:
    - cron: "31 4 1 * *"

permissions:
  contents: write

concurrency:
  group: parleymap-monthly-roster-review
  cancel-in-progress: false

jobs:
  roster-review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Stabilize before roster review
        run: node scripts/parleymap-final-stabilize.mjs

      - name: Safe current-holder roster review
        run: node scripts/parleymap-current-holder-safe-update.mjs

      - name: Stabilize and audit after roster review
        run: node scripts/parleymap-final-stabilize.mjs

      - name: Validate final embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Show summary
        if: always()
        run: |
          cat data/diagnostics/LATEST_RUN_SUMMARY.md || true
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload monthly roster files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-monthly-roster-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit monthly roster review
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Review ParleyMap roster safely"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
