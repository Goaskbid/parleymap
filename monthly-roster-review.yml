name: ParleyMap monthly roster review

on:
  workflow_dispatch:
  schedule:
    - cron: "31 4 1 * *"

permissions:
  contents: write

concurrency:
  group: parleymap-monthly-roster-review
  cancel-in-progress: false

jobs:
  monthly-roster-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Repair data integrity before review
        run: node scripts/parleymap-data-integrity-repair.cjs

      - name: Run safe roster review diagnostics
        run: node scripts/parleymap-safe-roster-review.cjs

      - name: Preserve AdSense and legal pages
        run: node scripts/parleymap-adsense-legal-repair.cjs
        env:
          PARLEYMAP_REQUIRE_ADSENSE_READY: "false"

      - name: Add run summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"; fi
          git diff --name-only >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload monthly files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-monthly-roster-files
          path: |
            index.html
            ads.txt
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit monthly review
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Review ParleyMap roster safely"
          file_pattern: "index.html ads.txt data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
