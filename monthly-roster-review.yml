name: ParleyMap monthly roster review

on:
  workflow_dispatch:
  schedule:
    - cron: "31 4 1 * *"

permissions:
  contents: write

concurrency:
  group: parleymap-monthly-roster-review
  cancel-in-progress: false

jobs:
  roster-review:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate current embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Install anchor guard before roster update if present
        run: |
          if [ -f scripts/install-anchor-guard.mjs ]; then
            node scripts/install-anchor-guard.mjs
          else
            echo "No anchor guard script present. Continuing."
          fi

      - name: Auto-update current office holders
        run: node scripts/roster-auto-updater.mjs
        env:
          PARLEYMAP_ROSTER_APPLY: "1"

      - name: Install anchor guard after roster update if present
        run: |
          if [ -f scripts/install-anchor-guard.mjs ]; then
            node scripts/install-anchor-guard.mjs
          else
            echo "No anchor guard script present. Continuing."
          fi

      - name: Validate final embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Build monthly summary
        if: always()
        run: |
          mkdir -p data/diagnostics
          {
            echo "# ParleyMap monthly roster review"
            echo ""
            echo "Run: ${GITHUB_RUN_NUMBER}"
            echo "Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo ""
            echo "## Roster auto update"
            if [ -f data/diagnostics/roster-auto-update-report.json ]; then cat data/diagnostics/roster-auto-update-report.json; else echo "No roster auto-update report."; fi
            echo ""
            echo "## Anchor guard"
            if [ -f data/diagnostics/anchor-guard-report.json ]; then cat data/diagnostics/anchor-guard-report.json; else echo "No anchor guard report."; fi
            echo ""
            echo "## Changed files"
            git diff --name-only || true
          } > data/diagnostics/LATEST_RUN_SUMMARY.md
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload roster review files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-monthly-roster-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md
          if-no-files-found: warn

      - name: Commit monthly roster update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Monthly ParleyMap roster update"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
