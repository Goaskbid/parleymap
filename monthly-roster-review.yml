name: ParleyMap monthly roster review

on:
  workflow_dispatch:
  schedule:
    - cron: "31 4 1 * *"

permissions:
  contents: write

concurrency:
  group: parleymap-monthly-roster-review
  cancel-in-progress: false

jobs:
  roster-review:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate current embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Repair anchors and faces before roster review
        run: node scripts/parleymap-repair-anchors-faces.mjs

      - name: Audit anchors before roster review
        run: node scripts/parleymap-audit-rescue.mjs

      - name: Run current-holder roster review with strict safe apply gate
        run: node scripts/parleymap-roster-current-holder-review.mjs --apply-safe

      - name: Repair anchors and faces after roster review
        run: node scripts/parleymap-repair-anchors-faces.mjs

      - name: Audit final dataset before commit
        run: node scripts/parleymap-audit-rescue.mjs

      - name: Validate final embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Build final run summary
        if: always()
        run: |
          node scripts/parleymap-build-final-summary.mjs || true
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Show changed files
        run: git diff --name-only

      - name: Upload monthly roster files artifact
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-monthly-roster-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit roster review result
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Monthly ParleyMap roster review with audited anchors"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
