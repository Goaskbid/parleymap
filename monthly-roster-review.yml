name: ParleyMap monthly roster review

on:
  workflow_dispatch:
  schedule:
    - cron: "31 4 1 * *"

permissions:
  contents: write

concurrency:
  group: parleymap-monthly-roster-review
  cancel-in-progress: false

jobs:
  monthly-roster-review:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rescue and audit before roster review
        run: |
          node scripts/parleymap-final-rescue.mjs
          node scripts/parleymap-final-audit.mjs

      - name: Run guarded current-holder review and apply small safe changes
        run: node scripts/parleymap-current-holder-review.mjs --apply

      - name: Rescue and audit after roster review
        run: |
          node scripts/parleymap-final-rescue.mjs
          node scripts/parleymap-final-audit.mjs

      - name: Validate final embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Build readable summary
        if: always()
        run: |
          node scripts/parleymap-build-summary.mjs
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload monthly roster files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-monthly-roster-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit monthly roster changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Review ParleyMap monthly roster"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
