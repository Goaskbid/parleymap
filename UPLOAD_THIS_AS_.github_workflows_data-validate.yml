name: ParleyMap data validation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rescue data integrity
        run: node scripts/parleymap-integrity-rescue.mjs

      - name: Preserve and audit existing AdSense setup
        run: node scripts/parleymap-adsense-preserve-audit.mjs

      - name: Final hard audit
        run: node scripts/parleymap-final-hard-audit.mjs

      - name: Show changed files
        run: git diff --name-only

      - name: Upload repaired files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-integrity-adsense-files
          path: |
            index.html
            ads.txt
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit repaired site data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Repair ParleyMap data integrity and preserve AdSense"
          file_pattern: "index.html ads.txt data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
