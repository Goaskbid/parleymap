name: ParleyMap data validation

on:
  workflow_dispatch:
    inputs:
      require_adsense_ready:
        description: "Fail unless AdSense IDs and ads.txt are present or recoverable"
        required: false
        default: "false"
      publisher_id:
        description: "Optional AdSense publisher/client ID, ca-pub-... or pub-..."
        required: false
        default: ""
      header_slot_id:
        description: "Optional header ad slot ID"
        required: false
        default: ""
      sidebar_slot_id:
        description: "Optional sidebar ad slot ID"
        required: false
        default: ""

permissions:
  contents: write


jobs:
  canonical-repair:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run canonical repair and hard audit
        run: |
          node scripts/parleymap-canonical-governor.cjs repair \
            --require-adsense-ready "${{ github.event.inputs.require_adsense_ready }}" \
            --publisher-id "${{ github.event.inputs.publisher_id }}" \
            --header-slot-id "${{ github.event.inputs.header_slot_id }}" \
            --sidebar-slot-id "${{ github.event.inputs.sidebar_slot_id }}"

      - name: Append summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Show changed files
        if: always()
        run: git diff --name-only || true

      - name: Upload repaired files and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-canonical-repair-files
          path: |
            index.html
            ads.txt
            privacy.html
            impressum.html
            about.html
            methodology.html
            data-sources.html
            contact.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit canonical repair
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Repair ParleyMap canonical data and AdSense surface"
          file_pattern: "index.html ads.txt privacy.html impressum.html about.html methodology.html data-sources.html contact.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
