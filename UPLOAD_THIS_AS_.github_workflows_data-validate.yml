name: ParleyMap data validation

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parleymap-final-stabilize
  cancel-in-progress: false

jobs:
  final-stabilize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Final stabilize, clean real events, anchors, faces
        run: node scripts/parleymap-final-stabilize.mjs

      - name: Validate embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Show summary
        if: always()
        run: |
          cat data/diagnostics/LATEST_RUN_SUMMARY.md || true
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload fixed files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-final-stabilized-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/final-stabilize-report.json
            data/diagnostics/final-audit-report.json
            data/diagnostics/LATEST_RUN_SUMMARY.md

      - name: Commit fixed website data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Final stabilize ParleyMap data"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
