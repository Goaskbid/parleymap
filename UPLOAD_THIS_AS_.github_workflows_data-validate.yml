name: ParleyMap data validation

on:
  workflow_dispatch:
    inputs:
      require_adsense_ready:
        description: "Fail if AdSense IDs or ads.txt cannot be verified"
        required: false
        default: "false"
      publisher_id:
        description: "Optional existing AdSense publisher ID, ca-pub-... or pub-..."
        required: false
        default: ""
      header_slot_id:
        description: "Optional existing header ad slot ID"
        required: false
        default: ""
      sidebar_slot_id:
        description: "Optional existing sidebar ad slot ID"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: parleymap-data-validation
  cancel-in-progress: false

jobs:
  repair-audit-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Canonical repair and hard audit
        run: node scripts/parleymap-canonical-rescue.cjs
        env:
          REQUIRE_ADSENSE_READY: ${{ inputs.require_adsense_ready }}
          PUBLISHER_ID: ${{ inputs.publisher_id }}
          HEADER_SLOT_ID: ${{ inputs.header_slot_id }}
          SIDEBAR_SLOT_ID: ${{ inputs.sidebar_slot_id }}

      - name: Validate embedded dataset with existing validator when present
        run: |
          if [ -f scripts/validate-demo-data.mjs ]; then
            node scripts/validate-demo-data.mjs
          else
            echo "scripts/validate-demo-data.mjs not present; canonical rescue audit already passed."
          fi

      - name: Add run summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Show changed files
        if: always()
        run: git diff --name-only || true

      - name: Upload repaired files and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-canonical-rescue-files
          path: |
            index.html
            ads.txt
            privacy.html
            impressum.html
            about.html
            contact.html
            methodology.html
            data-sources.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit repaired ParleyMap data and AdSense surface
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Repair ParleyMap canonical data and AdSense surface"
          file_pattern: "index.html ads.txt privacy.html impressum.html about.html contact.html methodology.html data-sources.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
