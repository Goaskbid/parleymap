name: ParleyMap data validation

on:
  workflow_dispatch:
    inputs:
      publisher_id:
        description: "Optional AdSense publisher ID, pub-... or ca-pub-...; leave blank to recover from current files and history"
        required: false
        default: ""
      header_slot_id:
        description: "Optional header ad unit slot ID; leave blank to recover from current files and history"
        required: false
        default: ""
      sidebar_slot_id:
        description: "Optional sidebar ad unit slot ID; leave blank to recover from current files and history"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: parleymap-structural-repair
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run structural repair and hard audit
        env:
          ADSENSE_PUBLISHER_ID: ${{ github.event.inputs.publisher_id }}
          ADSENSE_HEADER_SLOT_ID: ${{ github.event.inputs.header_slot_id }}
          ADSENSE_SIDEBAR_SLOT_ID: ${{ github.event.inputs.sidebar_slot_id }}
        run: node scripts/parleymap-structural-repair.cjs

      - name: Validate embedded dataset if validator exists
        run: |
          if [ -f scripts/validate-demo-data.mjs ]; then
            node scripts/validate-demo-data.mjs
          else
            echo "scripts/validate-demo-data.mjs not present; structural audit already passed."
          fi

      - name: Add summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload repaired files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-structural-repair-files
          path: |
            index.html
            ads.txt
            data/demo.json
            privacy.html
            impressum.html
            about.html
            contact.html
            methodology.html
            data-sources.html
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Show changed files
        run: git diff --name-only

      - name: Commit structural repair
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Repair ParleyMap structure, events, anchors and AdSense"
          file_pattern: "index.html ads.txt privacy.html impressum.html about.html contact.html methodology.html data-sources.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
