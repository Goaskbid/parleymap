name: ParleyMap roster auto update now

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parleymap-roster-auto-update-now
  cancel-in-progress: false

jobs:
  guarded-review-only:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Repair and audit data before roster diagnostics
        run: node scripts/parleymap-final-safe-repair.cjs

      - name: Run safe roster review, no mass replacement
        run: node scripts/parleymap-safe-roster-review.cjs

      - name: Write workflow summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload roster review files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-roster-review-files
          path: |
            index.html
            ads.txt
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit roster diagnostics and repairs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Run guarded ParleyMap roster review"
          file_pattern: "index.html ads.txt data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
