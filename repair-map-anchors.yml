ParleyMap emergency map anchor repair

Files included:
- scripts/force-map-anchor-trio.mjs
- .github/workflows/repair-map-anchors.yml

Install:
1. Unzip this package.
2. Upload the .github and scripts folders to the repository root.
3. Commit to main.
4. In GitHub Actions, run "ParleyMap repair map anchors" manually.
5. After success, hard refresh parleymap.com with Ctrl+F5.

This workflow only fixes institutional map anchors for:
- Claudia Sheinbaum -> Mexico City, Mexico
- Pope Leo XIV -> Vatican City
- Prabowo Subianto -> Jakarta, Indonesia

It validates the existing embedded dataset and preserves people, roster, expansionRoster, appearances and categories counts.
