name: ParleyMap nightly refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "19 3 * * *"

permissions:
  contents: write

concurrency:
  group: parleymap-nightly-refresh
  cancel-in-progress: false

jobs:
  safe-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Repair and audit before refresh
        run: node scripts/parleymap-final-safe-repair.cjs

      - name: Run safe nightly report, no synthetic events
        run: node scripts/parleymap-safe-nightly-report.cjs

      - name: Repair and audit after refresh
        run: node scripts/parleymap-final-safe-repair.cjs

      - name: Validate embedded dataset when validator exists
        run: |
          if [ -f scripts/validate-demo-data.mjs ]; then
            node scripts/validate-demo-data.mjs
          else
            echo "validate-demo-data.mjs missing; final safe repair already ran shape audit"
          fi

      - name: Write workflow summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload nightly files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-nightly-safe-files
          path: |
            index.html
            ads.txt
            data/demo.json
            data/crawler/*.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit nightly safe repair
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Run ParleyMap safe nightly refresh"
          file_pattern: "index.html ads.txt data/demo.json data/crawler/*.json data/diagnostics/*.json data/diagnostics/*.md"
