name: ParleyMap nightly refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "19 3 * * *"

permissions:
  contents: write

concurrency:
  group: parleymap-nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rescue and audit before refresh
        run: |
          node scripts/parleymap-final-rescue.mjs
          node scripts/parleymap-final-audit.mjs

      - name: Sync crawler input from current index.html
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const open = '<script id="demo-data" type="application/json">';
          const close = '</' + 'script>';
          const start = html.indexOf(open);
          if (start === -1) throw new Error('demo-data opening tag not found');
          const jsonStart = start + open.length;
          const end = html.indexOf(close, jsonStart);
          if (end === -1) throw new Error('demo-data closing tag not found');
          const data = JSON.parse(html.slice(jsonStart, end).trim());
          fs.mkdirSync('data', { recursive: true });
          fs.writeFileSync('data/demo.json', JSON.stringify(data, null, 2) + '\n');
          console.log(JSON.stringify({ people: data.people?.length, roster: data.roster?.length, expansionRoster: data.expansionRoster?.length, appearances: data.appearances?.length }, null, 2));
          NODE

      - name: Clear old crawler outputs
        run: |
          mkdir -p data/crawler
          rm -f data/crawler/candidate-appearances.json
          rm -f data/crawler/publishable-appearances.json
          rm -f data/crawler/quality-approved-appearances.json
          rm -f data/crawler/rejected-appearances.json
          rm -f data/crawler/crawl-report.json

      - name: Run bounded crawler when available
        id: crawler
        continue-on-error: true
        run: |
          if [ -f nightly-refresh.mjs ]; then
            timeout 12m node nightly-refresh.mjs --max-roster 60 --max-per-person 2 --max-pages-per-source 8 --lookback-days 21
          else
            echo "nightly-refresh.mjs not found; skipping crawler."
          fi
        env:
          PARLEYMAP_FETCH_TIMEOUT_MS: "3000"

      - name: Ensure crawler output files exist
        run: |
          node - <<'NODE'
          const fs = require('fs');
          fs.mkdirSync('data/crawler', { recursive: true });
          for (const p of ['candidate-appearances.json', 'publishable-appearances.json', 'quality-approved-appearances.json', 'rejected-appearances.json']) {
            const f = 'data/crawler/' + p;
            if (!fs.existsSync(f)) fs.writeFileSync(f, '[]\n');
          }
          if (!fs.existsSync('data/crawler/crawl-report.json')) {
            fs.writeFileSync('data/crawler/crawl-report.json', JSON.stringify({ generatedAt: new Date().toISOString(), status: 'crawler_skipped_or_no_output', candidates: 0, publishable: 0 }, null, 2) + '\n');
          }
          NODE

      - name: Publish guarded crawler output when publisher exists
        run: |
          if [ -f scripts/guarded-publish-from-crawler.mjs ]; then
            node scripts/guarded-publish-from-crawler.mjs
          elif [ -f scripts/publish-crawler-appearances.mjs ]; then
            node scripts/publish-crawler-appearances.mjs
          else
            echo "No crawler publisher script found; keeping crawler output as diagnostics only."
          fi

      - name: Rescue and audit after refresh
        run: |
          node scripts/parleymap-final-rescue.mjs
          node scripts/parleymap-final-audit.mjs

      - name: Validate embedded dataset
        run: |
          if [ -f scripts/validate-demo-data.mjs ]; then
            node scripts/validate-demo-data.mjs
          else
            echo "No legacy validator found; final audit already passed."
          fi

      - name: Build summary
        if: always()
        run: |
          node scripts/parleymap-build-summary.mjs || true
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload nightly files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-nightly-run-files
          path: |
            index.html
            data/demo.json
            data/curated-anchors.json
            data/crawler/*.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit nightly refresh
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh ParleyMap safely"
          file_pattern: "index.html data/demo.json data/curated-anchors.json data/crawler/*.json data/diagnostics/*.json data/diagnostics/*.md"
