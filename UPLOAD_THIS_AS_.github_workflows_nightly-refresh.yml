name: ParleyMap nightly refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "19 3 * * *"

permissions:
  contents: write

concurrency:
  group: parleymap-nightly-refresh
  cancel-in-progress: false

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pre-repair data integrity
        run: node scripts/parleymap-data-integrity-repair.cjs

      - name: Run bounded crawler only if existing safe script is available
        continue-on-error: true
        run: |
          if [ -f nightly-refresh.mjs ]; then
            timeout 10m node nightly-refresh.mjs --max-roster 40 --max-per-person 1 --max-pages-per-source 5 --lookback-days 14 || true
          else
            echo "nightly-refresh.mjs not present; skipping crawler."
          fi
        env:
          PARLEYMAP_FETCH_TIMEOUT_MS: "3000"

      - name: Post-repair data integrity and remove synthetic watch rows
        run: node scripts/parleymap-data-integrity-repair.cjs

      - name: Preserve AdSense and legal pages
        run: node scripts/parleymap-adsense-legal-repair.cjs
        env:
          PARLEYMAP_REQUIRE_ADSENSE_READY: "false"

      - name: Validate if existing validator is present
        run: |
          if [ -f scripts/validate-demo-data.mjs ]; then node scripts/validate-demo-data.mjs; fi

      - name: Add run summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"; fi
          git diff --name-only >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload nightly files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-nightly-repair-files
          path: |
            index.html
            ads.txt
            privacy.html
            impressum.html
            contact.html
            about.html
            methodology.html
            data-sources.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md
            data/crawler/*.json

      - name: Commit nightly repair
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh ParleyMap safely"
          file_pattern: "index.html ads.txt privacy.html impressum.html contact.html about.html methodology.html data-sources.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md data/crawler/*.json"
