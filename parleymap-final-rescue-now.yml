name: ParleyMap final rescue now

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parleymap-final-rescue
  cancel-in-progress: false

jobs:
  rescue:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run final rescue and hard audit
        run: node scripts/parleymap-safe-rescue.mjs

      - name: Validate embedded dataset
        run: |
          if [ -f scripts/validate-demo-data.mjs ]; then
            node scripts/validate-demo-data.mjs
          else
            echo "No existing validator found. Final rescue already validated core schema."
          fi

      - name: Build readable summary
        if: always()
        run: |
          node scripts/parleymap-build-summary.mjs
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - name: Show changed files
        run: git diff --name-only

      - name: Upload fixed files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-final-rescue-files
          path: |
            index.html
            data/demo.json
            data/parleymap-anchor-registry.json
            data/diagnostics/final-rescue-report.json
            data/diagnostics/final-audit-report.json
            data/diagnostics/LATEST_RUN_SUMMARY.md

      - name: Commit final rescue
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Apply ParleyMap final rescue"
          file_pattern: "index.html data/demo.json data/parleymap-anchor-registry.json data/diagnostics/final-rescue-report.json data/diagnostics/final-audit-report.json data/diagnostics/LATEST_RUN_SUMMARY.md"
