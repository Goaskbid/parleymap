How to see changes after each run

Open the workflow run, then check the Summary tab.
Open data/diagnostics/LATEST_RUN_SUMMARY.md.
Open data/diagnostics/final-rescue-audit-report.json.
Open data/diagnostics/anchor-face-repair-report.json.
Open data/diagnostics/roster-current-holder-review.json after roster runs.

How to download fixed files

Open the workflow run, scroll to Artifacts, and download the artifact ZIP.
The rescue workflow artifact is named parleymap-final-repaired-files.
The nightly workflow artifact is named parleymap-nightly-run-files.
The monthly roster workflow artifact is named parleymap-monthly-roster-files.
