name: ParleyMap final rescue now

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parleymap-final-rescue
  cancel-in-progress: false

jobs:
  rescue:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run final rescue
        run: node scripts/parleymap-final-rescue.mjs

      - name: Run final audit
        run: node scripts/parleymap-final-audit.mjs

      - name: Validate embedded dataset
        run: |
          if [ -f scripts/validate-demo-data.mjs ]; then
            node scripts/validate-demo-data.mjs
          else
            echo "No legacy validator found; final audit already passed."
          fi

      - name: Build summary
        if: always()
        run: |
          node scripts/parleymap-build-summary.mjs || true
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload final rescue files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-final-rescue-files
          path: |
            index.html
            data/demo.json
            data/curated-anchors.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit final rescue
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Apply ParleyMap final rescue"
          file_pattern: "index.html data/demo.json data/curated-anchors.json data/diagnostics/*.json data/diagnostics/*.md"
