name: ParleyMap anchor guard now

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  anchor-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply anchor guard
        run: node scripts/apply-anchor-guard.mjs

      - name: Validate embedded dataset
        run: node scripts/validate-parleymap-embedded.mjs

      - name: Build run summary
        if: always()
        run: |
          node scripts/build-parleymap-summary.mjs
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - name: Show changed files
        if: always()
        run: git diff --name-only || true

      - name: Upload fixed files artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-fixed-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md
            .github/workflows/*.yml
            scripts/*.mjs
          if-no-files-found: ignore

      - name: Commit anchor guard fix
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Fix ParleyMap anchor guard"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md .github/workflows/*.yml scripts/*.mjs"
