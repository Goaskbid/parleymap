name: ParleyMap roster auto update now

on:
  workflow_dispatch:
  schedule:
    - cron: "31 4 1 * *"

permissions:
  contents: write

concurrency:
  group: parleymap-roster-auto-update
  cancel-in-progress: false

jobs:
  roster-auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply people and roster auto update
        run: |
          node - <<'NODE'
          const fs = require("fs");

          const INDEX_PATH = "index.html";
          const REPORT_PATH = "data/diagnostics/roster-auto-update-report.json";
          const PATCH_PATH = "data/diagnostics/roster-patch-candidates.json";
          const SUMMARY_PATH = "data/diagnostics/LATEST_RUN_SUMMARY.md";

          const OPEN = '<script id="demo-data" type="application/json">';
          const CLOSE = "</" + "script>";

          const TARGET_COUNTRIES = [
            { code: "US", name: "United States", qid: "Q30", base: ["Washington", "United States", 38.9072, -77.0369, "North America"] },
            { code: "MX", name: "Mexico", qid: "Q96", base: ["Mexico City", "Mexico", 19.4326, -99.1332, "North America"] },
            { code: "ID", name: "Indonesia", qid: "Q252", base: ["Jakarta", "Indonesia", -6.2088, 106.8456, "Asia"] },
            { code: "FR", name: "France", qid: "Q142", base: ["Paris", "France", 48.8566, 2.3522, "Europe"] },
            { code: "DE", name: "Germany", qid: "Q183", base: ["Berlin", "Germany", 52.52, 13.405, "Europe"] },
            { code: "GB", name: "United Kingdom", qid: "Q145", base: ["London", "United Kingdom", 51.5074, -0.1278, "Europe"] },
            { code: "CA", name: "Canada", qid: "Q16", base: ["Ottawa", "Canada", 45.4215, -75.6972, "North America"] },
            { code: "BR", name: "Brazil", qid: "Q155", base: ["Brasilia", "Brazil", -15.7939, -47.8828, "South America"] },
            { code: "IN", name: "India", qid: "Q668", base: ["New Delhi", "India", 28.6139, 77.209, "South Asia"] },
            { code: "JP", name: "Japan", qid: "Q17", base: ["Tokyo", "Japan", 35.6762, 139.6503, "Asia"] },
            { code: "AU", name: "Australia", qid: "Q408", base: ["Canberra", "Australia", -35.2809, 149.13, "Oceania"] },
            { code: "IT", name: "Italy", qid: "Q38", base: ["Rome", "Italy", 41.9028, 12.4964, "Europe"] },
            { code: "ES", name: "Spain", qid: "Q29", base: ["Madrid", "Spain", 40.4168, -3.7038, "Europe"] },
            { code: "PL", name: "Poland", qid: "Q36", base: ["Warsaw", "Poland", 52.2297, 21.0122, "Europe"] },
            { code: "UA", name: "Ukraine", qid: "Q212", base: ["Kyiv", "Ukraine", 50.4501, 30.5234, "Europe"] },
            { code: "TR", name: "Turkey", qid: "Q43", base: ["Ankara", "Turkey", 39.9334, 32.8597, "Middle East"] },
            { code: "SA", name: "Saudi Arabia", qid: "Q851", base: ["Riyadh", "Saudi Arabia", 24.7136, 46.6753, "Middle East"] },
            { code: "AE", name: "United Arab Emirates", qid: "Q878", base: ["Abu Dhabi", "United Arab Emirates", 24.4539, 54.3773, "Middle East"] },
            { code: "QA", name: "Qatar", qid: "Q846", base: ["Doha", "Qatar", 25.2854, 51.531, "Middle East"] },
            { code: "IL", name: "Israel", qid: "Q801", base: ["Jerusalem", "Israel", 31.7683, 35.2137, "Middle East"] },
            { code: "ZA", name: "South Africa", qid: "Q258", base: ["Pretoria", "South Africa", -25.7479, 28.2293, "Africa"] },
            { code: "AR", name: "Argentina", qid: "Q414", base: ["Buenos Aires", "Argentina", -34.6037, -58.3816, "South America"] }
          ];

          function norm(value) {
            return String(value || "")
              .toLowerCase()
              .normalize("NFKD")
              .replace(/[\u0300-\u036f]/g, "")
              .replace(/[^a-z0-9]+/g, " ")
              .trim();
          }

          function slug(value) {
            return norm(value)
              .replace(/ /g, "-")
              .replace(/^-+|-+$/g, "")
              .slice(0, 80);
          }

          function readEmbedded() {
            const html = fs.readFileSync(INDEX_PATH, "utf8");
            const start = html.indexOf(OPEN);
            if (start === -1) throw new Error("demo-data opening tag not found");
            const jsonStart = start + OPEN.length;
            const jsonEnd = html.indexOf(CLOSE, jsonStart);
            if (jsonEnd === -1) throw new Error("demo-data closing tag not found");
            const data = JSON.parse(html.slice(jsonStart, jsonEnd).trim());
            return { html, jsonStart, jsonEnd, data };
          }

          function writeEmbedded(payload, data) {
            const nextHtml =
              payload.html.slice(0, payload.jsonStart) +
              "\n" +
              JSON.stringify(data, null, 2) +
              "\n" +
              payload.html.slice(payload.jsonEnd);

            fs.writeFileSync(INDEX_PATH, nextHtml);
            fs.mkdirSync("data", { recursive: true });
            fs.writeFileSync("data/demo.json", JSON.stringify(data, null, 2) + "\n");
          }

          function counts(data) {
            return {
              people: data.people?.length ?? null,
              roster: data.roster?.length ?? null,
              topRoster: data.topRoster?.length ?? null,
              expansionRoster: data.expansionRoster?.length ?? null,
              appearances: data.appearances?.length ?? null,
              categories: data.categories?.length ?? null
            };
          }

          function validate(data) {
            for (const key of ["people", "roster", "expansionRoster", "appearances", "categories"]) {
              if (!Array.isArray(data[key])) throw new Error(`${key} must be an array`);
            }

            if (data.people.length < 90) throw new Error("people count too low");
            if (data.roster.length < 190) throw new Error("roster count too low");
            if (data.expansionRoster.length < 100) throw new Error("expansionRoster count too low");
            if (data.appearances.length < 500) throw new Error("appearances count too low");
            if (data.categories.length < 10) throw new Error("categories count too low");
          }

          async function fetchEntity(qid) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 8000);

            try {
              const response = await fetch(`https://www.wikidata.org/wiki/Special:EntityData/${qid}.json`, {
                signal: controller.signal,
                headers: {
                  "user-agent": "ParleyMap roster auto update"
                }
              });

              if (!response.ok) throw new Error(`Wikidata HTTP ${response.status}`);
              const json = await response.json();
              return json.entities?.[qid] || null;
            } finally {
              clearTimeout(timeout);
            }
          }

          function label(entity) {
            return entity?.labels?.en?.value || entity?.labels?.mul?.value || "";
          }

          function description(entity) {
            return entity?.descriptions?.en?.value || "";
          }

          function claimIds(entity, property) {
            const claims = entity?.claims?.[property] || [];

            return claims
              .map((claim) => claim?.mainsnak?.datavalue?.value?.id)
              .filter(Boolean);
          }

          function deathDate(entity) {
            const claim = entity?.claims?.P570?.[0];
            return claim?.mainsnak?.datavalue?.value?.time || null;
          }

          function imageUrl(entity) {
            const file = entity?.claims?.P18?.[0]?.mainsnak?.datavalue?.value;
            if (!file) return null;

            return `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(file)}`;
          }

          function anchorFromBase(country) {
            const [city, countryName, lat, lng, region] = country.base;

            return {
              label: `${city} institutional base`,
              city,
              countryCode: country.code,
              countryName,
              lat,
              lng,
              precision: "city",
              type: "institutional_base",
              privacy: "city-level public institutional base only",
              region
            };
          }

          function applyAnchor(row, country) {
            const anchor = anchorFromBase(country);

            row.countryFocus = country.code;
            row.countryFocusCode = country.code;
            row.countryCode = country.code;
            row.countryName = country.name;
            row.country = country.name;
            row.homeRegion = anchor.region;
            row.locationStatus = "institutional_base_city_level";
            row.homeBases = [anchor];
            row.homeBase = anchor;
            row.mapAnchor = anchor;
            row.anchorLocation = anchor;
            row.baseLocation = anchor;
            row.institutionalBase = anchor;

            row.lat = anchor.lat;
            row.lng = anchor.lng;
            row.latitude = anchor.lat;
            row.longitude = anchor.lng;
            row.mapLat = anchor.lat;
            row.mapLng = anchor.lng;
            row.homeLat = anchor.lat;
            row.homeLng = anchor.lng;

            row.flagAudit = {
              ...(row.flagAudit || {}),
              code: country.code,
              countryCode: country.code,
              countryName: country.name,
              label: country.name,
              status: "country flag"
            };

            row.flagCode = country.code;
            row.countryFlagCode = country.code;
          }

          function rowText(row) {
            return norm([
              row.id,
              row.slug,
              row.name,
              row.canonicalName,
              row.roleTitle,
              row.organization,
              row.country,
              row.countryName,
              row.countryFocus,
              row.countryFocusCode
            ].join(" "));
          }

          function rowCountry(row) {
            return String(row.countryFocusCode || row.countryFocus || row.countryCode || "").toUpperCase();
          }

          function isHeadOfStateRole(row) {
            const text = rowText(row);
            return /(president|king|queen|monarch|emir|head of state|pope|pontiff)/.test(text) && !/former/.test(text);
          }

          function isHeadOfGovernmentRole(row) {
            const text = rowText(row);
            return /(prime minister|chancellor|head of government|premier)/.test(text) && !/former/.test(text);
          }

          function holderAlreadyPresent(rows, holder) {
            const holderName = norm(holder.name);

            return rows.find((row) => {
              const rowName = norm(row.canonicalName || row.name || "");
              const rowQid = String(row.wikidataId || "");
              return rowQid === holder.qid || rowName === holderName || rowName.includes(holderName) || holderName.includes(rowName);
            }) || null;
          }

          function findSlot(data, country, officeType) {
            const roleCheck = officeType === "P6" ? isHeadOfGovernmentRole : isHeadOfStateRole;

            const collections = ["roster", "topRoster", "people", "expansionRoster"];

            for (const collection of collections) {
              const rows = Array.isArray(data[collection]) ? data[collection] : [];

              const match = rows.find((row) => {
                const countryOk =
                  rowCountry(row) === country.code ||
                  norm(row.countryName || row.country) === norm(country.name);

                return countryOk && roleCheck(row);
              });

              if (match) {
                return { collection, row: match };
              }
            }

            return null;
          }

          function createOrUpdatePerson(data, slotRow, holder, country, officeType) {
            const existing = holderAlreadyPresent(data.people, holder);
            const base = existing || structuredClone(slotRow || {});
            const id = slug(holder.name);
            const image = holder.imageUrl || base.imageUrl || "";

            base.id = id;
            base.slug = id;
            base.name = holder.name;
            base.canonicalName = holder.name;
            base.wikidataId = holder.qid;
            base.wikiTitle = holder.name;
            base.profileUrl = `https://www.wikidata.org/wiki/${holder.qid}`;
            base.officialUrl = base.officialUrl || `https://www.wikidata.org/wiki/${holder.qid}`;
            base.imageUrl = image;
            base.imageProvider = image ? "Wikimedia Commons via Wikidata" : base.imageProvider || "needs review";
            base.roleTitle = officeType === "P6" ? `Head of government of ${country.name}` : `Head of state of ${country.name}`;
            base.organization = country.name;
            base.category = base.category || "political_leader";
            base.trackingStatus = "current_office_holder_auto_updated";
            base.sourcePriority = "monthly roster auto update";
            base.shortBio = holder.description || base.shortBio || `${holder.name}, current office holder for ${country.name}.`;
            base.profileLine = base.profileLine || base.roleTitle;
            base.lastRosterAutoUpdate = new Date().toISOString();

            applyAnchor(base, country);

            if (!existing) {
              data.people.push(base);
            } else {
              Object.assign(existing, base);
            }

            return base;
          }

          function replaceSlotEverywhere(data, oldId, oldName, newPerson, country, officeType, operations) {
            const collections = ["roster", "topRoster", "expansionRoster", "priorityExpansion", "watchlistExamples"];

            for (const collection of collections) {
              const rows = Array.isArray(data[collection]) ? data[collection] : [];
              for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                if (!row || typeof row !== "object") continue;

                const idHit = oldId && row.id === oldId;
                const nameHit = oldName && norm(row.canonicalName || row.name) === norm(oldName);
                const qidHit = row.wikidataId && row.wikidataId === newPerson.wikidataId;
                const countryHit = rowCountry(row) === country.code;
                const roleHit = officeType === "P6" ? isHeadOfGovernmentRole(row) : isHeadOfStateRole(row);

                if (idHit || nameHit || qidHit || (countryHit && roleHit)) {
                  const previous = structuredClone(row);
                  const rank = row.rank;
                  const prominenceScore = row.prominenceScore;

                  rows[i] = {
                    ...row,
                    ...structuredClone(newPerson),
                    rank,
                    prominenceScore: prominenceScore ?? newPerson.prominenceScore
                  };

                  applyAnchor(rows[i], country);

                  operations.push({
                    type: "replace_roster_slot",
                    collection,
                    index: i,
                    countryCode: country.code,
                    officeType,
                    oldId: previous.id || null,
                    oldName: previous.canonicalName || previous.name || null,
                    newId: rows[i].id,
                    newName: rows[i].canonicalName || rows[i].name
                  });
                }
              }
            }
          }

          function markFormer(data, oldId, oldName, country, reason, operations) {
            const collections = ["people", "roster", "topRoster", "expansionRoster", "priorityExpansion"];

            for (const collection of collections) {
              const rows = Array.isArray(data[collection]) ? data[collection] : [];
              for (const row of rows) {
                if (!row || typeof row !== "object") continue;

                const idHit = oldId && row.id === oldId;
                const nameHit = oldName && norm(row.canonicalName || row.name) === norm(oldName);

                if (!idHit && !nameHit) continue;

                if (!/^former/i.test(row.roleTitle || "")) {
                  row.roleTitle = `Former ${row.roleTitle || "office holder"}`;
                }

                row.trackingStatus = reason === "deceased" ? "deceased_historical_profile" : "former_office_holder";
                row.currentOfficeStatus = reason;
                row.lastRosterAutoUpdate = new Date().toISOString();

                operations.push({
                  type: "mark_former_or_deceased",
                  collection,
                  id: row.id || null,
                  name: row.canonicalName || row.name || null,
                  reason,
                  countryCode: country.code
                });
              }
            }
          }

          async function main() {
            fs.mkdirSync("data/diagnostics", { recursive: true });

            const payload = readEmbedded();
            const data = payload.data;
            validate(data);

            const before = counts(data);
            const operations = [];
            const candidates = [];
            const errors = [];
            const allRows = [
              ...(Array.isArray(data.people) ? data.people : []),
              ...(Array.isArray(data.roster) ? data.roster : []),
              ...(Array.isArray(data.topRoster) ? data.topRoster : []),
              ...(Array.isArray(data.expansionRoster) ? data.expansionRoster : [])
            ];

            for (const country of TARGET_COUNTRIES) {
              let countryEntity;

              try {
                countryEntity = await fetchEntity(country.qid);
              } catch (error) {
                errors.push({
                  countryCode: country.code,
                  stage: "fetch_country",
                  error: String(error.message || error)
                });
                continue;
              }

              const officeClaims = [
                { property: "P35", type: "P35", label: "head of state" },
                { property: "P6", type: "P6", label: "head of government" }
              ];

              const seenHolderQids = new Set();

              for (const office of officeClaims) {
                const holderQids = claimIds(countryEntity, office.property);

                for (const holderQid of holderQids) {
                  if (seenHolderQids.has(`${office.property}:${holderQid}`)) continue;
                  seenHolderQids.add(`${office.property}:${holderQid}`);

                  let holderEntity;

                  try {
                    holderEntity = await fetchEntity(holderQid);
                  } catch (error) {
                    errors.push({
                      countryCode: country.code,
                      holderQid,
                      stage: "fetch_holder",
                      error: String(error.message || error)
                    });
                    continue;
                  }

                  const holder = {
                    qid: holderQid,
                    name: label(holderEntity),
                    description: description(holderEntity),
                    deathDate: deathDate(holderEntity),
                    imageUrl: imageUrl(holderEntity)
                  };

                  if (!holder.name) continue;

                  const present = holderAlreadyPresent(allRows, holder);
                  const slot = findSlot(data, country, office.type);

                  candidates.push({
                    countryCode: country.code,
                    countryName: country.name,
                    officeType: office.type,
                    officeLabel: office.label,
                    holderName: holder.name,
                    holderQid: holder.qid,
                    alreadyPresent: Boolean(present),
                    slotFound: Boolean(slot),
                    slotName: slot?.row?.canonicalName || slot?.row?.name || null,
                    slotId: slot?.row?.id || null
                  });

                  if (!slot) continue;

                  const slotName = slot.row.canonicalName || slot.row.name || "";
                  const sameHolder =
                    String(slot.row.wikidataId || "") === holder.qid ||
                    norm(slotName) === norm(holder.name) ||
                    norm(slotName).includes(norm(holder.name)) ||
                    norm(holder.name).includes(norm(slotName));

                  if (sameHolder) {
                    applyAnchor(slot.row, country);
                    slot.row.wikidataId = holder.qid;
                    slot.row.canonicalName = holder.name;
                    slot.row.name = holder.name;
                    slot.row.lastRosterAutoUpdate = new Date().toISOString();

                    operations.push({
                      type: "confirm_current_holder_and_repair_anchor",
                      collection: slot.collection,
                      countryCode: country.code,
                      officeType: office.type,
                      name: holder.name,
                      wikidataId: holder.qid
                    });

                    continue;
                  }

                  const oldId = slot.row.id || null;
                  const oldName = slot.row.canonicalName || slot.row.name || null;

                  const newPerson = createOrUpdatePerson(data, slot.row, holder, country, office.type);
                  replaceSlotEverywhere(data, oldId, oldName, newPerson, country, office.type, operations);
                  markFormer(data, oldId, oldName, country, "replaced_by_current_office_holder", operations);
                }
              }
            }

            const uniqueWikidataIds = new Map();

            for (const row of allRows) {
              const qid = String(row.wikidataId || "");
              if (/^Q[0-9]+$/.test(qid) && !uniqueWikidataIds.has(qid)) {
                uniqueWikidataIds.set(qid, row);
              }
            }

            for (const [qid, row] of uniqueWikidataIds) {
              let entity;

              try {
                entity = await fetchEntity(qid);
              } catch {
                continue;
              }

              const died = deathDate(entity);

              if (!died) continue;

              markFormer(
                data,
                row.id || null,
                row.canonicalName || row.name || null,
                { code: rowCountry(row) || "UNKNOWN" },
                "deceased",
                operations
              );
            }

            data.meta = {
              ...(data.meta || {}),
              lastRosterAutoUpdate: new Date().toISOString(),
              rosterAutoUpdateStatus: `applied ${operations.length} roster auto-update operations`
            };

            validate(data);

            const after = counts(data);

            if (after.roster !== before.roster) {
              throw new Error(`roster count changed from ${before.roster} to ${after.roster}`);
            }

            if (after.expansionRoster !== before.expansionRoster) {
              throw new Error(`expansionRoster count changed from ${before.expansionRoster} to ${after.expansionRoster}`);
            }

            if (after.appearances !== before.appearances) {
              throw new Error(`appearances count changed from ${before.appearances} to ${after.appearances}`);
            }

            if (after.categories !== before.categories) {
              throw new Error(`categories count changed from ${before.categories} to ${after.categories}`);
            }

            writeEmbedded(payload, data);

            const report = {
              generatedAt: new Date().toISOString(),
              status: operations.length ? "roster_auto_update_applied" : "roster_auto_update_no_changes",
              before,
              after,
              targetCountryCount: TARGET_COUNTRIES.length,
              actionableChangeCount: operations.filter((op) => op.type === "replace_roster_slot").length,
              appliedOperationCount: operations.length,
              operations,
              candidates,
              errors
            };

            const patch = {
              generatedAt: report.generatedAt,
              status: "applied_or_reviewed",
              note: "Roster slots are auto-updated for current political office holders. Old people remain in people when needed to preserve historical appearances.",
              replacements: operations.filter((op) => op.type === "replace_roster_slot"),
              formerOrDeceased: operations.filter((op) => op.type === "mark_former_or_deceased"),
              candidates
            };

            fs.writeFileSync(REPORT_PATH, JSON.stringify(report, null, 2) + "\n");
            fs.writeFileSync(PATCH_PATH, JSON.stringify(patch, null, 2) + "\n");

            const summary = [
              "# ParleyMap roster auto update",
              "",
              `Generated: ${report.generatedAt}`,
              "",
              "## Result",
              "",
              `Status: ${report.status}`,
              `Target countries: ${report.targetCountryCount}`,
              `Roster replacements: ${report.actionableChangeCount}`,
              `Operations applied: ${report.appliedOperationCount}`,
              `Errors: ${errors.length}`,
              "",
              "## Counts",
              "",
              "| Dataset | Before | After |",
              "|---|---:|---:|",
              `| people | ${before.people} | ${after.people} |`,
              `| roster | ${before.roster} | ${after.roster} |`,
              `| topRoster | ${before.topRoster} | ${after.topRoster} |`,
              `| expansionRoster | ${before.expansionRoster} | ${after.expansionRoster} |`,
              `| appearances | ${before.appearances} | ${after.appearances} |`,
              "",
              "## Replacements",
              "",
              ...operations
                .filter((op) => op.type === "replace_roster_slot")
                .map((op) => `- ${op.countryCode} ${op.officeType}: ${op.oldName} -> ${op.newName}`)
            ].join("\n") + "\n";

            fs.writeFileSync(SUMMARY_PATH, summary);
            console.log(JSON.stringify(report, null, 2));
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Validate embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Show changed files
        run: git diff --name-only

      - name: Upload roster auto update files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-roster-auto-update-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/roster-auto-update-report.json
            data/diagnostics/roster-patch-candidates.json
            data/diagnostics/LATEST_RUN_SUMMARY.md

      - name: Commit roster auto update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update ParleyMap roster office holders"
          file_pattern: "index.html data/demo.json data/diagnostics/roster-auto-update-report.json data/diagnostics/roster-patch-candidates.json data/diagnostics/LATEST_RUN_SUMMARY.md"
