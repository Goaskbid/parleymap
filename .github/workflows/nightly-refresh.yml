name: Nightly public-source refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: parleymap-nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update embedded metadata only
        run: |
          node -e "const fs=require('fs');let html=fs.readFileSync('index.html','utf8');const m=html.match(/<script id=\"demo-data\" type=\"application\/json\">([\s\S]*?)<\/script>/);if(!m)throw new Error('demo-data block not found');const data=JSON.parse(m[1]);const now=new Date().toISOString();data.meta=data.meta||{};data.meta.lastDataUpdate=now;data.meta.lastCrawlerRun=now;data.meta.importStatus='nightly metadata refresh completed';data.meta.crawlerStatus='metadata-only refresh; external crawler disabled for timeout control';const json=JSON.stringify(data,null,2);html=html.replace(m[1],json);fs.writeFileSync('index.html',html);fs.mkdirSync('data',{recursive:true});fs.writeFileSync('data/demo.json',json+'\n');"

      - name: Show changed files
        run: git status --short

      - name: Commit refreshed metadata
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Nightly metadata refresh"
          file_pattern: "index.html data/demo.json"
