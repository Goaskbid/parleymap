name: Nightly public-source refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: parleymap-nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract full app dataset from index
        run: |
          mkdir -p data
          node -e "const fs=require('fs');const html=fs.readFileSync('index.html','utf8');const m=html.match(/<script id=\"demo-data\" type=\"application\/json\">([\s\S]*?)<\/script>/);if(!m)throw new Error('demo-data block not found');const data=JSON.parse(m[1]);const people=(data.people||data.roster||data.expansionRoster||[]);const apps=(data.appearances||data.records||[]);console.log('keys',Object.keys(data));console.log('peopleLike',people.length,'appearancesLike',apps.length);if(!Array.isArray(people)||people.length<20)throw new Error('no usable people roster');if(!Array.isArray(apps)||apps.length<20)throw new Error('no usable appearances/records');fs.writeFileSync('data/demo.json',JSON.stringify(data,null,2)+'\n');"

      - name: Run bounded real crawler
        run: node nightly-refresh.mjs --publish --lookback-days 14 --max-roster 20 --max-pages-per-source 10 --max-per-person 2
        env:
          PARLEYMAP_FETCH_TIMEOUT_MS: "8000"

      - name: Validate refreshed full dataset
        run: |
          node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('data/demo.json','utf8'));const people=(data.people||data.roster||data.expansionRoster||[]);const apps=(data.appearances||data.records||[]);console.log('validated peopleLike',people.length,'appearancesLike',apps.length);if(!Array.isArray(people)||people.length<20)throw new Error('refuse bad people roster');if(!Array.isArray(apps)||apps.length<20)throw new Error('refuse bad appearances/records');fs.writeFileSync('data/demo.json',JSON.stringify(data,null,2)+'\n');"

      - name: Inject validated dataset into index
        run: |
          node -e "const fs=require('fs');let html=fs.readFileSync('index.html','utf8');const json=fs.readFileSync('data/demo.json','utf8').trim();JSON.parse(json);html=html.replace(/(<script id=\"demo-data\" type=\"application\/json\">)[\s\S]*?(<\/script>)/,'$1'+json+'$2');fs.writeFileSync('index.html',html);"

      - name: Show changed files
        run: git status --short

      - name: Commit validated refresh
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Nightly validated public-source refresh"
          file_pattern: "index.html data/demo.json data/crawler/*.json"
