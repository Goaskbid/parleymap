name: Nightly public-source refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: parleymap-nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Seed data from working index
        run: |
          mkdir -p data
          node -e "const fs=require('fs');const html=fs.readFileSync('index.html','utf8');const m=html.match(/<script id=\"demo-data\" type=\"application\/json\">([\s\S]*?)<\/script>/);if(!m)throw new Error('demo-data block not found');JSON.parse(m[1]);fs.writeFileSync('data/demo.json',m[1].trim()+'\n');"

      - name: Run real bounded crawler
        run: node nightly-refresh.mjs --publish --lookback-days 14 --max-roster 20 --max-pages-per-source 10 --max-per-person 2

      - name: Inject refreshed data into index
        run: |
          node -e "const fs=require('fs');let html=fs.readFileSync('index.html','utf8');const json=fs.readFileSync('data/demo.json','utf8').trim();JSON.parse(json);html=html.replace(/(<script id=\"demo-data\" type=\"application\/json\">)[\s\S]*?(<\/script>)/,'$1'+json+'$2');fs.writeFileSync('index.html',html);"

      - name: Show changed files
        run: git status --short

      - name: Commit real refresh output
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Nightly real public-source refresh"
          file_pattern: "index.html data/demo.json data/crawler/*.json"
