name: ParleyMap monthly roster review

on:
  workflow_dispatch:
  schedule:
    - cron: "31 4 1 * *"

permissions:
  contents: write

concurrency:
  group: parleymap-monthly-roster-review
  cancel-in-progress: false

jobs:
  roster-review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate current live embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Apply roster hygiene
        run: node scripts/roster-hygiene.mjs

      - name: Apply map anchor hygiene
        run: node scripts/map-anchor-hygiene.mjs

      - name: Validate after hygiene
        run: node scripts/validate-demo-data.mjs

      - name: Run real roster review diagnostics
        run: node scripts/roster-review.mjs

      - name: Build quick run summary
        if: always()
        run: |
          node scripts/build-quick-summary.mjs
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - name: Show quick summary
        if: always()
        run: cat data/diagnostics/LATEST_RUN_SUMMARY.md || true

      - name: Commit roster hygiene and review diagnostics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Review ParleyMap roster and map anchors"
          file_pattern: "index.html data/diagnostics/*.json data/diagnostics/*.md"
