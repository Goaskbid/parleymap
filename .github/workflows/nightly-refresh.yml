name: ParleyMap nightly refresh

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate current live embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Run crawler
        run: node nightly-refresh.mjs

      - name: Publish crawler appearances into index.html
        run: node scripts/publish-crawler-appearances.mjs

      - name: Validate updated index.html
        run: node scripts/validate-demo-data.mjs

      - name: Commit refreshed website data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh ParleyMap embedded appearance data"
          file_pattern: "index.html data/crawler/*.json data/diagnostics/*.json"
