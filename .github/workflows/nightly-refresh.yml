name: ParleyMap nightly refresh

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-candidates-only:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate current live embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Run crawler candidate refresh only
        run: node nightly-refresh.mjs
        env:
          PARLEYMAP_SAFE_MODE: "1"

      - name: Block index.html changes
        run: |
          if git diff --name-only | grep -Fx "index.html"; then
            echo "ERROR: index.html changed during candidate refresh."
            git checkout -- index.html
          fi

      - name: Commit candidate outputs only
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh ParleyMap candidate data"
          file_pattern: "data/crawler/*.json data/diagnostics/*.json"
