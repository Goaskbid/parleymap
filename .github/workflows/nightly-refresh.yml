name: Nightly public-source refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: parleymap-nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract safe crawler seed
        run: |
          mkdir -p data
          node -e "const fs=require('fs');const html=fs.readFileSync('index.html','utf8');const m=html.match(/<script id=\"demo-data\" type=\"application\/json\">([\s\S]*?)<\/script>/);if(!m)throw new Error('demo-data block not found');const data=JSON.parse(m[1]);if(!Array.isArray(data.people)||data.people.length<200)throw new Error('bad people dataset, refusing refresh');if(!Array.isArray(data.appearances)||data.appearances.length<400)throw new Error('bad appearances dataset, refusing refresh');if(!Array.isArray(data.roster)&&!Array.isArray(data.expansionRoster))throw new Error('bad roster dataset, refusing refresh');fs.writeFileSync('data/demo.json',JSON.stringify(data,null,2)+'\n');console.log('seed ok people',data.people.length,'appearances',data.appearances.length);"

      - name: Run real crawler without live publish
        run: node nightly-refresh.mjs --lookback-days 14 --max-roster 20 --max-pages-per-source 10 --max-per-person 2
        env:
          PARLEYMAP_FETCH_TIMEOUT_MS: "8000"

      - name: Validate crawler reports
        run: |
          node -e "const fs=require('fs');const report='data/crawler/crawl-report.json';const cand='data/crawler/candidate-appearances.json';const pub='data/crawler/publishable-appearances.json';for(const f of [report,cand,pub]){if(!fs.existsSync(f))throw new Error('missing '+f);JSON.parse(fs.readFileSync(f,'utf8'));}console.log('crawler reports valid');"

      - name: Show changed files
        run: git status --short

      - name: Commit crawler reports only
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Nightly crawler reports"
          file_pattern: "data/crawler/*.json"
