name: Nightly public-source refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: parleymap-nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract crawler seed from index
        run: |
          mkdir -p data
          node -e "const fs=require('fs');const html=fs.readFileSync('index.html','utf8');const m=html.match(/<script id=\"demo-data\" type=\"application\/json\">([\s\S]*?)<\/script>/);if(!m)throw new Error('demo-data block not found');const data=JSON.parse(m[1]);console.log('people',Array.isArray(data.people)?data.people.length:'missing');console.log('appearances',Array.isArray(data.appearances)?data.appearances.length:'missing');console.log('roster',Array.isArray(data.roster)?data.roster.length:'missing');console.log('expansionRoster',Array.isArray(data.expansionRoster)?data.expansionRoster.length:'missing');if(!Array.isArray(data.people))throw new Error('people array missing');if(!Array.isArray(data.appearances))throw new Error('appearances array missing');fs.writeFileSync('data/demo.json',JSON.stringify(data,null,2)+'\n');"

      - name: Run bounded crawler report only
        run: node nightly-refresh.mjs --dry-run --lookback-days 14 --max-roster 20 --max-pages-per-source 10 --max-per-person 2
        env:
          PARLEYMAP_FETCH_TIMEOUT_MS: "8000"

      - name: Validate crawler reports
        run: |
          node -e "const fs=require('fs');for(const f of ['data/crawler/crawl-report.json','data/crawler/candidate-appearances.json','data/crawler/publishable-appearances.json']){if(!fs.existsSync(f))throw new Error('missing '+f);JSON.parse(fs.readFileSync(f,'utf8'));console.log('ok',f);}"

      - name: Show changed files
        run: git status --short

      - name: Commit crawler reports only
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Nightly crawler reports"
          file_pattern: "data/crawler/*.json"
