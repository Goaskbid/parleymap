name: Nightly public-source refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: parleymap-nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare data file
        run: |
          mkdir -p data
          node -e "const fs=require('fs'); const html=fs.readFileSync('index.html','utf8'); const m=html.match(/<script id=\"demo-data\" type=\"application\/json\">([\s\S]*?)<\/script>/); if(!m) throw new Error('demo-data block not found'); JSON.parse(m[1]); fs.writeFileSync('data/demo.json', m[1].trim() + '\n');"

      - name: Run crawler
        run: node nightly-refresh.mjs --publish

      - name: Show changed files
        run: git status --short

      - name: Commit crawler output only
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Nightly public-source refresh"
          file_pattern: "data/demo.json data/crawler/*.json"
