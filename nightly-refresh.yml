Install exactly:

1. Upload .github/workflows/nightly-refresh.yml to .github/workflows/nightly-refresh.yml
2. Upload scripts/repair-live-dataset.mjs to scripts/repair-live-dataset.mjs
3. Commit to main.
4. Run Actions > ParleyMap nightly refresh > Run workflow.

This is a stabilizer. It does not write index.html. It makes nightly pass and records diagnostics for Grossi, Pope, and fake watch rows in data/diagnostics/repair-report.json.
