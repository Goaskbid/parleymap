name: ParleyMap nightly refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "19 3 * * *"

permissions:
  contents: write

concurrency:
  group: parleymap-nightly-refresh
  cancel-in-progress: false

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate current embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Repair anchors and faces before refresh
        run: node scripts/parleymap-repair-anchors-faces.mjs

      - name: Audit anchors before refresh import
        run: node scripts/parleymap-audit-rescue.mjs

      - name: Sync crawler input from index.html
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const open = '<script id="demo-data" type="application/json">';
          const close = '</' + 'script>';
          const start = html.indexOf(open);
          if (start === -1) throw new Error('demo-data opening tag not found');
          const end = html.indexOf(close, start + open.length);
          if (end === -1) throw new Error('demo-data closing tag not found');
          const data = JSON.parse(html.slice(start + open.length, end).trim());
          fs.mkdirSync('data', { recursive: true });
          fs.writeFileSync('data/demo.json', JSON.stringify(data, null, 2) + '\n');
          console.log(JSON.stringify({ people: data.people?.length, roster: data.roster?.length, appearances: data.appearances?.length }, null, 2));
          NODE

      - name: Clear stale crawler outputs
        run: |
          mkdir -p data/crawler
          rm -f data/crawler/candidate-appearances.json
          rm -f data/crawler/publishable-appearances.json
          rm -f data/crawler/quality-approved-appearances.json
          rm -f data/crawler/rejected-appearances.json
          rm -f data/crawler/crawl-report.json

      - name: Run bounded crawler if available
        id: crawler
        continue-on-error: true
        run: |
          if [ -f nightly-refresh.mjs ]; then
            timeout 12m node nightly-refresh.mjs --max-roster 60 --max-per-person 2 --max-pages-per-source 8 --lookback-days 21
          else
            echo "nightly-refresh.mjs not found, crawler skipped."
          fi
        env:
          PARLEYMAP_FETCH_TIMEOUT_MS: "3000"

      - name: Ensure crawler output files exist
        run: |
          node - <<'NODE'
          const fs = require('fs');
          fs.mkdirSync('data/crawler', { recursive: true });
          if (!fs.existsSync('data/crawler/candidate-appearances.json')) fs.writeFileSync('data/crawler/candidate-appearances.json', '[]\n');
          if (!fs.existsSync('data/crawler/publishable-appearances.json')) fs.writeFileSync('data/crawler/publishable-appearances.json', '[]\n');
          if (!fs.existsSync('data/crawler/crawl-report.json')) {
            fs.writeFileSync('data/crawler/crawl-report.json', JSON.stringify({ generatedAt: new Date().toISOString(), status: 'crawler_skipped_or_failed', candidates: 0, publishable: 0 }, null, 2) + '\n');
          }
          NODE

      - name: Guard publish crawler output if publisher exists
        run: |
          if [ -f scripts/guarded-publish-from-crawler.mjs ]; then
            node scripts/guarded-publish-from-crawler.mjs
          else
            echo "guarded-publish-from-crawler.mjs not found, publish skipped."
          fi

      - name: Repair anchors and faces after refresh
        run: node scripts/parleymap-repair-anchors-faces.mjs

      - name: Audit final dataset before commit
        run: node scripts/parleymap-audit-rescue.mjs

      - name: Validate final embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Build final run summary
        if: always()
        run: |
          node scripts/parleymap-build-final-summary.mjs || true
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Show changed files
        run: git diff --name-only

      - name: Upload nightly files artifact
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-nightly-run-files
          path: |
            index.html
            data/demo.json
            data/crawler/*.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit refreshed website data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh ParleyMap safely with audited anchors"
          file_pattern: "index.html data/demo.json data/crawler/*.json data/diagnostics/*.json data/diagnostics/*.md"
