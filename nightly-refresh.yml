name: ParleyMap nightly refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "19 3 * * *"

permissions:
  contents: write

concurrency:
  group: parleymap-nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pre-refresh integrity rescue
        run: node scripts/parleymap-integrity-rescue.mjs

      - name: Preserve and audit existing AdSense setup
        run: node scripts/parleymap-adsense-preserve-audit.mjs

      - name: Safe nightly refresh without invented events
        run: node nightly-refresh.mjs

      - name: Post-refresh integrity rescue
        run: node scripts/parleymap-integrity-rescue.mjs

      - name: Final hard audit
        run: node scripts/parleymap-final-hard-audit.mjs

      - name: Upload nightly files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-nightly-files
          path: |
            index.html
            ads.txt
            data/demo.json
            data/crawler/*.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit nightly safe refresh
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Run ParleyMap safe nightly refresh"
          file_pattern: "index.html ads.txt data/demo.json data/crawler/*.json data/diagnostics/*.json data/diagnostics/*.md"
