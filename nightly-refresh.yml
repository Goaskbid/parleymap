name: ParleyMap nightly refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "19 3 * * *"

permissions:
  contents: write

concurrency:
  group: parleymap-nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pre-refresh stabilize and audit
        run: node scripts/parleymap-final-stabilize.mjs

      - name: Validate before crawler
        run: node scripts/validate-demo-data.mjs

      - name: Sync crawler input from current index.html
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const open = '<script id="demo-data" type="application/json">';
          const close = '</' + 'script>';
          const start = html.indexOf(open);
          if (start === -1) throw new Error('demo-data opening tag not found');
          const jsonStart = start + open.length;
          const end = html.indexOf(close, jsonStart);
          if (end === -1) throw new Error('demo-data closing tag not found');
          const data = JSON.parse(html.slice(jsonStart, end).trim());
          fs.mkdirSync('data', { recursive: true });
          fs.writeFileSync('data/demo.json', JSON.stringify(data, null, 2) + '\n');
          console.log(JSON.stringify({ people: data.people?.length, roster: data.roster?.length, appearances: data.appearances?.length }, null, 2));
          NODE

      - name: Run bounded crawler if present
        continue-on-error: true
        run: |
          if [ -f nightly-refresh.mjs ]; then
            timeout 12m node nightly-refresh.mjs --max-roster 60 --max-per-person 2 --max-pages-per-source 8 --lookback-days 21
          else
            echo "nightly-refresh.mjs not present"
          fi
        env:
          PARLEYMAP_FETCH_TIMEOUT_MS: "3000"

      - name: Publish crawler output if publisher exists
        continue-on-error: true
        run: |
          if [ -f scripts/guarded-publish-from-crawler.mjs ]; then
            node scripts/guarded-publish-from-crawler.mjs
          else
            echo "guarded publisher not present; crawler output left as diagnostics"
          fi

      - name: Post-refresh stabilize, remove non-real events, audit
        run: node scripts/parleymap-final-stabilize.mjs

      - name: Validate final embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Show summary
        if: always()
        run: |
          cat data/diagnostics/LATEST_RUN_SUMMARY.md || true
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload nightly files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-nightly-run-files
          path: |
            index.html
            data/demo.json
            data/crawler/*.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit nightly refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh ParleyMap guarded data"
          file_pattern: "index.html data/demo.json data/crawler/*.json data/diagnostics/*.json data/diagnostics/*.md"
