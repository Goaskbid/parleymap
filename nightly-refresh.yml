name: ParleyMap nightly refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "19 3 * * *"

permissions:
  contents: write

concurrency:
  group: parleymap-nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Structural repair before refresh
        run: node scripts/parleymap-structural-repair.cjs
      - name: Run bounded crawler if present
        continue-on-error: true
        run: |
          if [ -f nightly-refresh.mjs ]; then
            timeout 8m node nightly-refresh.mjs --max-roster 40 --max-per-person 1 --max-pages-per-source 6 --lookback-days 21
          elif [ -f scripts/nightly-refresh.mjs ]; then
            timeout 8m node scripts/nightly-refresh.mjs --max-roster 40 --max-per-person 1 --max-pages-per-source 6 --lookback-days 21
          else
            echo "No crawler present."
          fi
      - name: Structural repair after refresh
        run: node scripts/parleymap-structural-repair.cjs
      - name: Add summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload nightly files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-nightly-files
          path: |
            index.html
            ads.txt
            data/demo.json
            data/crawler/*.json
            data/diagnostics/*.json
            data/diagnostics/*.md
      - name: Commit nightly repair
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh ParleyMap safely"
          file_pattern: "index.html ads.txt privacy.html impressum.html about.html contact.html methodology.html data-sources.html data/demo.json data/crawler/*.json data/diagnostics/*.json data/diagnostics/*.md"
