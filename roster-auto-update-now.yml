name: ParleyMap roster auto update now

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  guarded-review-only:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Canonical truth repair
        run: node scripts/parleymap-canonical-truth-fix.cjs

      - name: Write guarded roster review notice
        run: |
          mkdir -p data/diagnostics
          cat > data/diagnostics/roster-auto-update-report.json <<'JSON'
          {
            "status": "disabled_safe_review_only",
            "reason": "Automatic mass replacement is disabled after the historical office-holder pollution failure. Use monthly review diagnostics only."
          }
          JSON

      - name: Upload files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-roster-safe-review-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit safe roster review output
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Run safe ParleyMap roster review only"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
