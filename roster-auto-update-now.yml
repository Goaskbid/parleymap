name: ParleyMap roster auto update now

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parleymap-monthly-roster-review
  cancel-in-progress: false

jobs:
  roster-auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Stabilize before roster update
        run: node scripts/parleymap-final-stabilize.mjs

      - name: Safe current-holder roster update
        run: node scripts/parleymap-current-holder-safe-update.mjs

      - name: Stabilize and audit after roster update
        run: node scripts/parleymap-final-stabilize.mjs

      - name: Validate final embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Show summary
        if: always()
        run: |
          cat data/diagnostics/LATEST_RUN_SUMMARY.md || true
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload roster update files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-roster-auto-update-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit safe roster update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Safely update ParleyMap roster office holders"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
