name: ParleyMap roster auto update now

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parleymap-roster-auto-update
  cancel-in-progress: false

jobs:
  roster-auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rescue and audit before roster update
        run: node scripts/parleymap-safe-rescue.mjs

      - name: Run guarded current-holder roster update
        run: node scripts/parleymap-current-holder-review.mjs
        env:
          AUTO_APPLY_SAFE_ROSTER: "1"

      - name: Rescue and audit after roster update
        run: node scripts/parleymap-safe-rescue.mjs

      - name: Validate final index.html
        run: |
          if [ -f scripts/validate-demo-data.mjs ]; then node scripts/validate-demo-data.mjs; fi

      - name: Build readable summary
        if: always()
        run: |
          node scripts/parleymap-build-summary.mjs
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload roster update files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-roster-auto-update-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit guarded roster update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Run ParleyMap guarded roster update"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
