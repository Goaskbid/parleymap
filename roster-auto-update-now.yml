name: ParleyMap roster auto update now

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  safe-review-only:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Canonical repair
        run: node scripts/parleymap-canonical-rescue.cjs
        env:
          REQUIRE_ADSENSE_READY: "false"

      - name: Safe current-holder roster review diagnostics
        run: node scripts/parleymap-safe-roster-review.cjs

      - name: Add run summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload roster review files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-roster-review-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit safe roster review diagnostics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Review ParleyMap roster safely"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
