name: ParleyMap final audited rescue now

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parleymap-final-audited-rescue
  cancel-in-progress: false

jobs:
  rescue:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore data before unsafe roster auto update if needed
        run: |
          PEOPLE_COUNT=$(node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const open = '<script id="demo-data" type="application/json">';
          const close = '</' + 'script>';
          const s = html.indexOf(open);
          const e = html.indexOf(close, s + open.length);
          const data = JSON.parse(html.slice(s + open.length, e).trim());
          console.log(Array.isArray(data.people) ? data.people.length : 9999);
          NODE
          )
          echo "people before rescue: ${PEOPLE_COUNT}"
          BAD_COMMIT=$(git log --grep="Auto update ParleyMap roster office holders" --format=%H -n 1 || true)
          if [ -n "${BAD_COMMIT}" ] && [ "${PEOPLE_COUNT}" -gt 115 ]; then
            echo "Restoring index.html and data/demo.json from before unsafe roster auto update: ${BAD_COMMIT}"
            git checkout "${BAD_COMMIT}^" -- index.html || true
            git checkout "${BAD_COMMIT}^" -- data/demo.json || true
          else
            echo "No unsafe roster rollback needed."
          fi

      - name: Repair anchors, faces, and runtime marker guard
        run: node scripts/parleymap-repair-anchors-faces.mjs

      - name: Audit repaired dataset before commit
        run: node scripts/parleymap-audit-rescue.mjs

      - name: Validate embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Build final run summary
        if: always()
        run: |
          node scripts/parleymap-build-final-summary.mjs || true
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Show changed files
        run: git diff --name-only

      - name: Upload repaired files artifact
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-final-repaired-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit repaired website data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Final audited repair of ParleyMap anchors and faces"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
