name: ParleyMap roster auto update now

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  safe-review-only:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refuse unsafe automatic roster replacement and write review files
        run: node scripts/parleymap-safe-roster-review.cjs

      - name: Upload roster review files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-roster-review-files
          path: |
            data/diagnostics/roster-current-holder-review.json
            data/diagnostics/roster-patch-candidates.json

      - name: Commit roster review files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Write safe ParleyMap roster review diagnostics"
          file_pattern: "data/diagnostics/roster-current-holder-review.json data/diagnostics/roster-patch-candidates.json"
