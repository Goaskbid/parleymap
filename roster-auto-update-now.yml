name: ParleyMap roster auto update now

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parleymap-roster-auto-update
  cancel-in-progress: false

jobs:
  guarded-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Stabilize anchors and data first
        run: node scripts/parleymap-institutional-rescue.cjs

      - name: Run safe roster review only
        run: node scripts/parleymap-safe-roster-review.cjs

      - name: Upload safe roster review files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-roster-safe-review-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit safe roster diagnostics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Run guarded ParleyMap roster review"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
