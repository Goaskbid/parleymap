name: ParleyMap roster auto update now

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  safe-review-only:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Stabilize data
        run: node scripts/parleymap-integrity-rescue.mjs

      - name: Safe current-holder review only
        run: node scripts/parleymap-current-holder-safe-review.mjs

      - name: Final hard audit
        run: node scripts/parleymap-final-hard-audit.mjs

      - name: Upload roster review files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-roster-review-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit safe roster review files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Run ParleyMap safe roster review"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
