name: ParleyMap roster auto update now

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  safe-review-only:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run safe roster review only
        run: node scripts/parleymap-safe-roster-review.cjs

      - name: Upload roster review diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-safe-roster-review-files
          path: |
            data/diagnostics/roster-safe-review.json
            data/diagnostics/roster-patch-candidates.json
            data/diagnostics/LATEST_RUN_SUMMARY.md

      - name: Commit safe roster diagnostics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Review ParleyMap roster safely"
          file_pattern: "data/diagnostics/roster-safe-review.json data/diagnostics/roster-patch-candidates.json data/diagnostics/LATEST_RUN_SUMMARY.md"
