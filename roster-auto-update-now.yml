name: ParleyMap roster auto update now

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parleymap-roster-auto-update-now
  cancel-in-progress: false

jobs:
  roster-auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rescue and audit before roster auto update
        run: |
          node scripts/parleymap-final-rescue.mjs
          node scripts/parleymap-final-audit.mjs

      - name: Apply guarded current-holder roster update
        run: node scripts/parleymap-current-holder-review.mjs --apply

      - name: Rescue and audit after roster auto update
        run: |
          node scripts/parleymap-final-rescue.mjs
          node scripts/parleymap-final-audit.mjs

      - name: Validate final embedded dataset
        run: node scripts/validate-demo-data.mjs

      - name: Build readable summary
        if: always()
        run: |
          node scripts/parleymap-build-summary.mjs
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload roster update files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-roster-update-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit roster auto update changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Apply guarded ParleyMap roster auto update"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
