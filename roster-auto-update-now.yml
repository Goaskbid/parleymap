name: ParleyMap roster auto update now

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  roster-auto-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Stabilize data before roster review
        run: node scripts/parleymap-final-stabilize.mjs

      - name: Safe current-holder review only
        run: node scripts/parleymap-current-holder-safe-update.mjs

      - name: Stabilize data after roster review
        run: node scripts/parleymap-final-stabilize.mjs

      - name: Build summary
        if: always()
        run: |
          node scripts/parleymap-build-summary.mjs || true
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload roster review files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-roster-review-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit safe roster review
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Review ParleyMap roster safely"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
