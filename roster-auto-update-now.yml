name: ParleyMap roster auto update now

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parleymap-roster-auto-update-now
  cancel-in-progress: false

jobs:
  safe-review-only:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout full repository history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Canonical repair
        env:
          REQUIRE_ADSENSE_READY: "false"
        run: node scripts/parleymap-canonical-rescue.cjs

      - name: Safe roster review diagnostics
        run: node scripts/parleymap-safe-roster-review.cjs

      - name: Show summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
            cat data/diagnostics/LATEST_RUN_SUMMARY.md
          fi

      - name: Upload roster review files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-roster-safe-review-files
          path: |
            index.html
            ads.txt
            data/demo.json
            data/diagnostics/*

      - name: Commit safe roster review
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Run ParleyMap safe roster review"
          file_pattern: "index.html ads.txt data/demo.json data/diagnostics/* privacy.html impressum.html about.html contact.html methodology.html data-sources.html"
