name: ParleyMap data validation

on:
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  adsense-repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Write AdSense-only repair script
        run: |
          mkdir -p scripts data/diagnostics
          cat > scripts/parleymap-adsense-only-repair.cjs <<'NODE'
          const fs = require('fs');
          const cp = require('child_process');
          
          const INDEX_PATH = 'index.html';
          const REPORT_PATH = 'data/diagnostics/adsense-only-repair-report.json';
          const SUMMARY_PATH = 'data/diagnostics/LATEST_RUN_SUMMARY.md';
          
          function sh(command, options = {}) {
            return cp.execSync(command, { encoding: 'utf8', stdio: ['ignore', 'pipe', 'pipe'], ...options });
          }
          
          function exists(path) {
            try { return fs.existsSync(path); } catch { return false; }
          }
          
          function read(path) {
            return exists(path) ? fs.readFileSync(path, 'utf8') : '';
          }
          
          function write(path, content) {
            fs.mkdirSync(path.split('/').slice(0, -1).join('/') || '.', { recursive: true });
            fs.writeFileSync(path, content);
          }
          
          function unique(values) {
            const out = [];
            const seen = new Set();
            for (const value of values) {
              if (!value || seen.has(value)) continue;
              seen.add(value);
              out.push(value);
            }
            return out;
          }
          
          function candidateFilesFromGit() {
            const candidates = [];
            const paths = ['index.html', 'index.template.html', 'privacy.html', 'impressum.html', 'ads.txt'];
            for (const path of paths) {
              try {
                const commits = sh(`git rev-list --all -- ${path}`).split('\n').filter(Boolean).slice(0, 80);
                for (const commit of commits) {
                  try {
                    const content = sh(`git show ${commit}:${path}`, { maxBuffer: 80 * 1024 * 1024 });
                    candidates.push({ source: `${commit}:${path}`, path, content });
                  } catch {}
                }
              } catch {}
            }
            return candidates;
          }
          
          function currentCandidates() {
            const paths = ['index.html', 'index.template.html', 'privacy.html', 'impressum.html', 'ads.txt', '404.html'];
            return paths.filter(exists).map(path => ({ source: `current:${path}`, path, content: read(path) }));
          }
          
          function isFullAppHtml(html) {
            if (!html || html.length < 50000) return false;
            if (!/<html[\s>]/i.test(html)) return false;
            if (!/ParleyMap|ParlayMap/i.test(html)) return false;
            if (!/<script\s+id=["']demo-data["']\s+type=["']application\/json["']/i.test(html)) return false;
            return true;
          }
          
          function recoverFullIndex(candidates) {
            const current = read(INDEX_PATH);
            if (isFullAppHtml(current)) {
              return { html: current, source: 'current:index.html', restored: false };
            }
            for (const candidate of candidates) {
              if (candidate.path === 'index.html' && isFullAppHtml(candidate.content)) {
                fs.writeFileSync(INDEX_PATH, candidate.content);
                return { html: candidate.content, source: candidate.source, restored: true };
              }
            }
            throw new Error('Could not recover a full index.html with demo-data from current file or git history. No write performed.');
          }
          
          function collectAdsenseIds(candidates) {
            const text = candidates.map(c => c.content).join('\n');
            const clients = unique([...(text.match(/ca-pub-[0-9]{10,24}/g) || [])]);
            const pubs = unique([...(text.match(/(?<!ca-)pub-[0-9]{10,24}/g) || [])]);
            const slots = unique([...(text.matchAll(/data-ad-slot=["']([0-9]{4,32})["']/g))].map(m => m[1]));
            const client = clients[0] || (pubs[0] ? `ca-${pubs[0]}` : null);
            const publisherId = client ? client.replace(/^ca-/, '') : pubs[0] || null;
            return {
              client,
              publisherId,
              headerSlot: slots[0] || null,
              sidebarSlot: slots[1] || null,
              allClients: clients,
              allPubs: pubs,
              allSlots: slots
            };
          }
          
          function insertBeforeHeadClose(html, snippet) {
            if (html.includes(snippet.trim())) return html;
            if (/<\/head>/i.test(html)) return html.replace(/<\/head>/i, `${snippet}\n</head>`);
            return `${snippet}\n${html}`;
          }
          
          function ensureMeta(html, client) {
            const meta = `<meta name="google-adsense-account" content="${client}">`;
            if (/name=["']google-adsense-account["']/i.test(html)) {
              return html.replace(/<meta[^>]+name=["']google-adsense-account["'][^>]*>/i, meta);
            }
            return insertBeforeHeadClose(html, meta);
          }
          
          function ensureLoader(html, client) {
            const src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${client}`;
            const loader = `<script async src="${src}" crossorigin="anonymous"></script>`;
            if (/pagead2\.googlesyndication\.com\/pagead\/js\/adsbygoogle\.js/i.test(html)) {
              return html.replace(/<script[^>]+pagead2\.googlesyndication\.com\/pagead\/js\/adsbygoogle\.js\?client=ca-pub-[0-9]{10,24}[^>]*><\/script>/i, loader);
            }
            return insertBeforeHeadClose(html, loader);
          }
          
          function ensureAdMountScript(html, ids) {
            const marker = 'parleymap-adsense-repair-v1';
            const script = `
          <script id="${marker}">
          (function(){
            var client = ${JSON.stringify(ids.client)};
            var headerSlot = ${JSON.stringify(ids.headerSlot)};
            var sidebarSlot = ${JSON.stringify(ids.sidebarSlot)};
            function unit(slot, label){
              return '<ins class="adsbygoogle" style="display:block;min-height:90px" data-ad-client="' + client + '" data-ad-slot="' + slot + '" data-ad-format="auto" data-full-width-responsive="true" aria-label="' + label + '"></ins>';
            }
            function containsText(el, text){
              return el && (el.textContent || '').toLowerCase().indexOf(text) !== -1;
            }
            function findBox(kind){
              var all = Array.prototype.slice.call(document.querySelectorAll('div,section,aside'));
              var terms = kind === 'header' ? ['header ad slot','leaderboard','advertisement'] : ['sidebar ad slot','sidebar','advertisement'];
              for (var i=0;i<all.length;i++) {
                var t = (all[i].textContent || '').toLowerCase();
                if (terms.every(function(term){ return t.indexOf(term) !== -1; })) return all[i];
              }
              for (var j=0;j<all.length;j++) {
                if (kind === 'header' && containsText(all[j], 'header ad slot')) return all[j];
                if (kind === 'sidebar' && containsText(all[j], 'sidebar ad slot')) return all[j];
              }
              return null;
            }
            function mount(){
              var header = findBox('header');
              var sidebar = findBox('sidebar');
              if (header && !header.querySelector('ins.adsbygoogle')) header.innerHTML = unit(headerSlot, 'ParleyMap header advertisement');
              if (sidebar && !sidebar.querySelector('ins.adsbygoogle')) sidebar.innerHTML = unit(sidebarSlot, 'ParleyMap sidebar advertisement');
              var ads = document.querySelectorAll('ins.adsbygoogle');
              for (var i=0;i<ads.length;i++) {
                try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
              }
            }
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', mount); else mount();
          })();
          </script>`.trim();
            if (html.includes(marker)) {
              return html.replace(new RegExp(`<script id=["']${marker}["'][\\s\\S]*?<\\/script>`), script);
            }
            return insertBeforeHeadClose(html, script);
          }
          
          function ensureStaticUnits(html, ids) {
            const markerStart = '<!-- ParleyMap AdSense static units start -->';
            const markerEnd = '<!-- ParleyMap AdSense static units end -->';
            const block = `${markerStart}
          <div id="parleymap-adsense-static-units" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden" aria-hidden="true">
            <ins class="adsbygoogle" style="display:block" data-ad-client="${ids.client}" data-ad-slot="${ids.headerSlot}" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <ins class="adsbygoogle" style="display:block" data-ad-client="${ids.client}" data-ad-slot="${ids.sidebarSlot}" data-ad-format="auto" data-full-width-responsive="true"></ins>
          </div>
          ${markerEnd}`;
            if (html.includes(markerStart)) {
              return html.replace(new RegExp(`${markerStart}[\\s\\S]*?${markerEnd}`), block);
            }
            if (/<\/body>/i.test(html)) return html.replace(/<\/body>/i, `${block}\n</body>`);
            return `${html}\n${block}\n`;
          }
          
          function cleanPage(title, body) {
            return `<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>${title} | ParleyMap</title>
            <style>body{font-family:Arial,sans-serif;max-width:860px;margin:40px auto;padding:0 20px;line-height:1.55;color:#111}a{color:#0b57d0}</style>
          </head>
          <body>
            <main>
              <h1>${title}</h1>
              ${body}
              <p><a href="/">Back to ParleyMap</a></p>
            </main>
          </body>
          </html>
          `;
          }
          
          function writeLegalPages() {
            write('privacy.html', cleanPage('Privacy Policy', `
          <p>ParleyMap provides a public-source map of public appearances, official meetings, summits, and institutional travel records. The service does not publish private addresses, hotels, live routes, residences, leaked itineraries, or private movement data.</p>
          <p>We may use essential cookies for site operation. If advertising cookies are accepted, third-party advertising partners such as Google may use cookies or similar technologies to serve and measure ads.</p>
          <p>Public-source profile, organization, and event data is compiled from official or host-public sources and is presented at city-level precision unless a public venue is deliberately part of the official event record.</p>
          <p>Contact: <a href="mailto:contact@parleymap.com">contact@parleymap.com</a></p>`));
          
            write('impressum.html', cleanPage('Impressum', `
          <p>ParleyMap is operated as a public-source information and research service.</p>
          <p>Responsible contact: <a href="mailto:contact@parleymap.com">contact@parleymap.com</a></p>
          <p>This site publishes documented public appearances, official meetings, and institutional events only. It does not provide live tracking or private-location information.</p>`));
          
            write('about.html', cleanPage('About', `
          <p>ParleyMap helps users understand where public influence is forming by mapping documented public appearances, meetings, summits, and institutional events.</p>
          <p>The service focuses on public-interest records and conservative location precision.</p>`));
          
            write('contact.html', cleanPage('Contact', `
          <p>For corrections, privacy questions, source issues, or advertising questions, contact: <a href="mailto:contact@parleymap.com">contact@parleymap.com</a></p>`));
          
            write('methodology.html', cleanPage('Methodology', `
          <p>ParleyMap uses public-source records such as official schedules, official statements, host-public event pages, summit agendas, and verified public meeting records.</p>
          <p>Records should include a person, date or date window, city-level location, event title, and source pack. Generic watch lists, homepages, topic pages, and profile pages are not treated as dated events.</p>`));
          
            write('data-sources.html', cleanPage('Data Sources', `
          <p>ParleyMap prioritizes official and host-public sources, including government websites, international organizations, institutional press rooms, summit hosts, and official travel or engagement calendars.</p>
          <p>Source packs are used to separate confirmed public records from leads, generic watch items, or non-event source-monitoring notes.</p>`));
          }
          
          function audit(html, ids) {
            const failures = [];
            if (!html.includes(ids.client)) failures.push('index.html missing AdSense client');
            if (!html.includes(ids.headerSlot)) failures.push('index.html missing header slot');
            if (!html.includes(ids.sidebarSlot)) failures.push('index.html missing sidebar slot');
            if (!/google-adsense-account/i.test(html)) failures.push('index.html missing google-adsense-account meta');
            if (!/pagead2\.googlesyndication\.com/i.test(html)) failures.push('index.html missing AdSense loader');
            if ((html.match(/class=["']adsbygoogle["']/g) || []).length < 2) failures.push('index.html has fewer than 2 adsbygoogle units');
            if (!exists('ads.txt')) failures.push('ads.txt missing');
            const adsTxt = read('ads.txt');
            if (!adsTxt.includes(`google.com, ${ids.publisherId}, DIRECT, f08c47fec0942fa0`)) failures.push('ads.txt line mismatch');
            for (const page of ['privacy.html','impressum.html','about.html','contact.html','methodology.html','data-sources.html']) {
              const content = read(page);
              if (!/<html/i.test(content) || !/<main/i.test(content)) failures.push(`${page} is not clean HTML`);
              if (/npm|build log|scripts\/|data\/|\.github\/|workflow/i.test(content)) failures.push(`${page} contains repo/build text`);
            }
            return failures;
          }
          
          fs.mkdirSync('data/diagnostics', { recursive: true });
          const candidates = [...currentCandidates(), ...candidateFilesFromGit()];
          const ids = collectAdsenseIds(candidates);
          
          const report = {
            generatedAt: new Date().toISOString(),
            status: null,
            client: ids.client,
            publisherId: ids.publisherId,
            headerSlot: ids.headerSlot,
            sidebarSlot: ids.sidebarSlot,
            recoveredClients: ids.allClients,
            recoveredPublisherIds: ids.allPubs,
            recoveredSlots: ids.allSlots,
            restoredIndexFrom: null,
            failures: []
          };
          
          if (!ids.client || !ids.publisherId || !ids.headerSlot || !ids.sidebarSlot) {
            report.status = 'adsense_ids_not_found_no_fake_ids_injected';
            report.failures.push('Could not recover ca-pub/pub and two data-ad-slot IDs from current files or git history. No fake IDs were injected.');
            write(REPORT_PATH, JSON.stringify(report, null, 2) + '\n');
            write(SUMMARY_PATH, '# ParleyMap AdSense repair\n\nAdSense IDs were not recoverable. No fake IDs were injected.\n');
            console.log(JSON.stringify(report, null, 2));
            process.exit(1);
          }
          
          const recovered = recoverFullIndex(candidates);
          report.restoredIndexFrom = recovered.source;
          let html = read(INDEX_PATH);
          html = ensureMeta(html, ids.client);
          html = ensureLoader(html, ids.client);
          html = ensureAdMountScript(html, ids);
          html = ensureStaticUnits(html, ids);
          fs.writeFileSync(INDEX_PATH, html);
          
          fs.writeFileSync('ads.txt', `google.com, ${ids.publisherId}, DIRECT, f08c47fec0942fa0\n`);
          writeLegalPages();
          
          html = read(INDEX_PATH);
          const failures = audit(html, ids);
          report.failures = failures;
          report.status = failures.length ? 'adsense_repair_failed_audit' : 'adsense_repair_applied';
          write(REPORT_PATH, JSON.stringify(report, null, 2) + '\n');
          
          write(SUMMARY_PATH, [
            '# ParleyMap AdSense-only repair',
            '',
            `Generated: ${report.generatedAt}`,
            '',
            `Status: ${report.status}`,
            `Client: ${report.client}`,
            `Publisher ID: ${report.publisherId}`,
            `Header slot: ${report.headerSlot}`,
            `Sidebar slot: ${report.sidebarSlot}`,
            `Index source: ${report.restoredIndexFrom}`,
            '',
            '## Files repaired',
            '',
            '- index.html',
            '- ads.txt',
            '- privacy.html',
            '- impressum.html',
            '- about.html',
            '- contact.html',
            '- methodology.html',
            '- data-sources.html',
            '',
            '## Failures',
            '',
            ...(failures.length ? failures.map(f => `- ${f}`) : ['- none'])
          ].join('\n') + '\n');
          
          console.log(JSON.stringify(report, null, 2));
          if (failures.length) process.exit(1);
          NODE

      - name: Run AdSense-only repair
        run: node scripts/parleymap-adsense-only-repair.cjs

      - name: Show changed files
        if: always()
        run: git diff --name-only

      - name: Upload AdSense repair files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-adsense-repair-files
          path: |
            index.html
            ads.txt
            privacy.html
            impressum.html
            about.html
            contact.html
            methodology.html
            data-sources.html
            data/diagnostics/adsense-only-repair-report.json
            data/diagnostics/LATEST_RUN_SUMMARY.md

      - name: Commit AdSense repair
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Repair ParleyMap AdSense surface"
          file_pattern: "index.html ads.txt privacy.html impressum.html about.html contact.html methodology.html data-sources.html scripts/parleymap-adsense-only-repair.cjs data/diagnostics/adsense-only-repair-report.json data/diagnostics/LATEST_RUN_SUMMARY.md"
