name: ParleyMap data validation

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parleymap-canonical-maintenance
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Write canonical maintenance script
        run: |
          mkdir -p scripts data/diagnostics data/crawler
          cat > scripts/parleymap-maintenance.cjs <<'NODE'
          const fs = require('fs');
          const cp = require('child_process');

          const INDEX = 'index.html';
          const MIRROR = 'data/demo.json';
          const DIAG = 'data/diagnostics';
          const OPEN = '<script id="demo-data" type="application/json">';
          const CLOSE = '</' + 'script>';
          const NOW = new Date().toISOString();

          const TARGETS = [
            { key:'rafael_grossi', names:['rafael grossi','rafael mariano grossi'], terms:['grossi'], anchor:{ city:'Vienna', countryCode:'AT', countryName:'Austria', lat:48.2082, lng:16.3738, region:'Europe', label:'Vienna institutional base' }, org:'International Atomic Energy Agency', orgMark:'IAEA', image:'https://commons.wikimedia.org/wiki/Special:FilePath/Rafael%20Grossi%20IAEA%20Director%20General.jpg' },
            { key:'pope_leo_xiv', names:['pope leo xiv','leo xiv','robert prevost','robert francis prevost'], terms:['pope'], anchor:{ city:'Vatican City', countryCode:'VA', countryName:'Vatican City', lat:41.9029, lng:12.4534, region:'Europe', label:'Vatican City institutional base' }, org:'Holy See', orgMark:'Vatican', image:'https://commons.wikimedia.org/wiki/Special:FilePath/Pope%20Leo%20XIV%20official%20portrait.jpg' },
            { key:'claudia_sheinbaum', names:['claudia sheinbaum','claudia sheinbaum pardo'], terms:['claudia','sheinbaum'], anchor:{ city:'Mexico City', countryCode:'MX', countryName:'Mexico', lat:19.4326, lng:-99.1332, region:'North America', label:'Mexico City institutional base' }, org:'Mexico', orgMark:'MX', image:'https://commons.wikimedia.org/wiki/Special:FilePath/Claudia%20Sheinbaum%20(cropped,%20centered).jpg' },
            { key:'prabowo_subianto', names:['prabowo subianto'], terms:['prabowo','subianto'], anchor:{ city:'Jakarta', countryCode:'ID', countryName:'Indonesia', lat:-6.2088, lng:106.8456, region:'Asia', label:'Jakarta institutional base' }, org:'Indonesia', orgMark:'ID', image:'https://commons.wikimedia.org/wiki/Special:FilePath/Prabowo%20Subianto%202024%20official%20portrait.jpg' },
            { key:'mohammed_bin_salman', names:['mohammed bin salman','mohammad bin salman','muhammad bin salman','mbs'], terms:['salman'], any:['mohammed','mohammad','muhammad','mbs'], anchor:{ city:'Riyadh', countryCode:'SA', countryName:'Saudi Arabia', lat:24.7136, lng:46.6753, region:'Middle East', label:'Riyadh institutional base' }, org:'Saudi Arabia', orgMark:'SA' },
            { key:'king_charles', names:['king charles iii','charles iii'], terms:['charles'], any:['king','monarch'], anchor:{ city:'London', countryCode:'GB', countryName:'United Kingdom', lat:51.5074, lng:-0.1278, region:'Europe', label:'London institutional base' }, org:'United Kingdom', orgMark:'GB' },
            { key:'mark_rutte', names:['mark rutte'], terms:['mark','rutte'], anchor:{ city:'Brussels', countryCode:'BE', countryName:'Belgium', lat:50.8798, lng:4.4219, region:'Europe', label:'NATO Brussels institutional base' }, org:'NATO', orgMark:'NATO' },
            { key:'antonio_guterres', names:['antonio guterres','antónio guterres'], terms:['guterres'], anchor:{ city:'New York', countryCode:'US', countryName:'United States', lat:40.7499, lng:-73.9680, region:'North America', label:'UN New York institutional base' }, org:'United Nations', orgMark:'UN' },
            { key:'emmanuel_macron', names:['emmanuel macron'], terms:['emmanuel','macron'], anchor:{ city:'Paris', countryCode:'FR', countryName:'France', lat:48.8566, lng:2.3522, region:'Europe', label:'Paris institutional base' }, org:'France', orgMark:'FR' },
            { key:'ursula_von_der_leyen', names:['ursula von der leyen'], terms:['ursula','leyen'], anchor:{ city:'Brussels', countryCode:'BE', countryName:'Belgium', lat:50.8503, lng:4.3517, region:'Europe', label:'Brussels institutional base' }, org:'European Union', orgMark:'EU' },
            { key:'kaja_kallas', names:['kaja kallas'], terms:['kaja','kallas'], anchor:{ city:'Brussels', countryCode:'BE', countryName:'Belgium', lat:50.8503, lng:4.3517, region:'Europe', label:'Brussels institutional base' }, org:'European Union', orgMark:'EU' }
          ];

          const FAKE_EVENT_RE = /\b(iaea nuclear diplomacy watch|city of london finance diplomacy watch|think[- ]tank leadership events watch|royal diaries|royal diary|state[- ]visit watch|source watch|source-watch|watch card|diplomacy watch|events watch)\b/i;
          const GENERIC_EVENT_RE = /\b(faq|frequently asked|foire aux questions|homepage|home page|profile page|fact sheet|programme|program|sitemap|privacy|terms|cookie)\b/i;
          const EVENT_ARRAY_HINT = /appearances|events|agendas|summits|signals|alerts|watch|timeline|catalog|calls|meetings/i;
          const PROFILE_ARRAYS = ['people','roster','topRoster','expansionRoster','priorityExpansion','watchlistExamples'];
          const HELPER_PROFILE_ARRAYS = ['topRoster','priorityExpansion','watchlistExamples'];

          function norm(v){ return String(v||'').toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim(); }
          function slug(v){ return norm(v).replace(/ /g,'-').replace(/^-+|-+$/g,'').slice(0,90); }
          function read(path){ return fs.existsSync(path) ? fs.readFileSync(path,'utf8') : ''; }
          function sh(cmd){ return cp.execSync(cmd,{encoding:'utf8',stdio:['ignore','pipe','pipe']}); }
          function safeJsonParse(s){ try { return JSON.parse(s); } catch { return null; } }
          function extract(html){
            const start = html.indexOf(OPEN);
            if(start < 0) return null;
            const jsonStart = start + OPEN.length;
            const end = html.indexOf(CLOSE, jsonStart);
            if(end < 0) return null;
            const txt = html.slice(jsonStart,end).trim();
            const data = safeJsonParse(txt);
            if(!data) return null;
            return { html, jsonStart, jsonEnd:end, data };
          }
          function count(data,k){ return Array.isArray(data && data[k]) ? data[k].length : null; }
          function basicOk(data){
            return data && typeof data === 'object' &&
              Array.isArray(data.people) && data.people.length >= 80 &&
              Array.isArray(data.roster) && data.roster.length >= 180 &&
              Array.isArray(data.expansionRoster) && data.expansionRoster.length >= 90 &&
              Array.isArray(data.appearances) && data.appearances.length >= 450 &&
              Array.isArray(data.categories) && data.categories.length >= 8;
          }
          function recoverIndex(){
            const current = read(INDEX);
            const currentExtracted = extract(current);
            if(currentExtracted && basicOk(currentExtracted.data)) return currentExtracted;
            const commits = sh('git rev-list --all -- index.html').split(/\n/).filter(Boolean);
            for(const sha of commits){
              let html = '';
              try { html = sh(`git show ${sha}:index.html`); } catch { continue; }
              const ex = extract(html);
              if(ex && basicOk(ex.data)){
                fs.writeFileSync(INDEX, html);
                return ex;
              }
            }
            throw new Error('No safe full index.html with demo-data found in git history. Current index.html cannot be repaired safely.');
          }
          function replaceDemo(payload, data){
            const next = payload.html.slice(0,payload.jsonStart) + '\n' + JSON.stringify(data,null,2) + '\n' + payload.html.slice(payload.jsonEnd);
            fs.writeFileSync(INDEX,next);
            fs.mkdirSync('data',{recursive:true});
            fs.writeFileSync(MIRROR, JSON.stringify(data,null,2)+'\n');
          }
          function textOf(obj){
            if(!obj || typeof obj !== 'object') return '';
            return norm([obj.id,obj.slug,obj.name,obj.canonicalName,obj.wikiTitle,obj.wikidataId,obj.roleTitle,obj.organization,obj.orgMark,obj.countryName,obj.countryFocus,obj.countryFocusCode,obj.profileLine,Array.isArray(obj.profileLines)?obj.profileLines.join(' '):'',obj.title,obj.summary].join(' '));
          }
          function matchesTarget(obj, target){
            const t = textOf(obj);
            if(!t) return false;
            if((target.names||[]).some(n => t.includes(norm(n)))) return true;
            const termsOk = !target.terms || target.terms.every(term => t.includes(norm(term)));
            const anyOk = !target.any || target.any.some(term => t.includes(norm(term)));
            return termsOk && anyOk;
          }
          function isProfileLike(obj){
            return obj && typeof obj === 'object' && !Array.isArray(obj) && !obj.startsAt && (obj.slug || obj.name || obj.canonicalName || obj.roleTitle || obj.wikidataId || obj.profileLine);
          }
          function anchorObj(target){
            const a = target.anchor;
            return { label:a.label, city:a.city, countryCode:a.countryCode, countryName:a.countryName, lat:a.lat, lng:a.lng, precision:'city', type:'institutional_base', privacy:'city-level public institutional base only' };
          }
          function patchProfile(obj, target, report, path, visible){
            const a = target.anchor;
            const anchor = anchorObj(target);
            const before = { countryFocus:obj.countryFocus, countryFocusCode:obj.countryFocusCode, countryName:obj.countryName, flagAudit:obj.flagAudit, lat:obj.lat, lng:obj.lng };
            obj.countryFocus = a.countryCode;
            obj.countryFocusCode = a.countryCode;
            obj.countryCode = a.countryCode;
            obj.countryName = a.countryName;
            obj.country = a.countryName;
            obj.homeRegion = a.region;
            obj.locationStatus = 'institutional_base_city_level';
            obj.homeBases = [anchor];
            obj.homeBase = anchor;
            obj.mapAnchor = anchor;
            obj.anchorLocation = anchor;
            obj.baseLocation = anchor;
            obj.institutionalBase = anchor;
            obj.lat = a.lat; obj.lng = a.lng; obj.lon = a.lng; obj.long = a.lng;
            obj.latitude = a.lat; obj.longitude = a.lng;
            obj.homeLat = a.lat; obj.homeLng = a.lng; obj.homeLon = a.lng; obj.homeLongitude = a.lng;
            obj.mapLat = a.lat; obj.mapLng = a.lng; obj.mapLon = a.lng; obj.mapLongitude = a.lng;
            obj.anchorLat = a.lat; obj.anchorLng = a.lng; obj.anchorLon = a.lng; obj.anchorLongitude = a.lng;
            obj.coordinates = { lat:a.lat, lng:a.lng };
            obj.geo = { lat:a.lat, lng:a.lng, city:a.city, countryCode:a.countryCode, countryName:a.countryName };
            obj.flagAudit = { ...(obj.flagAudit || {}), code:a.countryCode, countryCode:a.countryCode, label:a.countryName, countryName:a.countryName, status:'country flag' };
            obj.flagCode = a.countryCode;
            obj.countryFlagCode = a.countryCode;
            if(target.org){ obj.organization = target.org; obj.orgMark = target.orgMark || obj.orgMark; }
            if(target.image && (!obj.imageUrl || /placeholder|blank|missing/i.test(String(obj.imageUrl)))){ obj.imageUrl = target.image; obj.imageProvider = obj.imageProvider || 'curated public source'; }
            obj.__parleymapCanonicalAnchor = target.key;
            if(visible === false){ obj.renderOnMap = false; obj.mapVisible = false; obj.includeInOpeningMap = false; obj.visible = false; obj.trackingStatus = 'duplicate_hidden_by_canonical_repair'; }
            report.anchorRepairs.push({ path, target:target.key, before, after:{ countryFocusCode:obj.countryFocusCode, countryName:obj.countryName, lat:obj.lat, lng:obj.lng } });
          }
          function walk(obj, fn, path='data'){
            if(!obj || typeof obj !== 'object') return;
            fn(obj,path);
            if(Array.isArray(obj)) obj.forEach((v,i)=>walk(v,fn,`${path}[${i}]`));
            else Object.entries(obj).forEach(([k,v])=>{ if(v && typeof v === 'object') walk(v,fn,`${path}.${k}`); });
          }
          function eventText(o){ return norm([o && o.id,o && o.title,o && o.summary,o && o.status,o && o.eventType,o && o.type,o && o.label].join(' ')); }
          function isFakeEvent(o){
            if(!o || typeof o !== 'object' || Array.isArray(o)) return false;
            const txt = eventText(o);
            const dated = !!(o.startsAt || o.date || o.endsAt || o.eventDate);
            const sourceWatch = /source watch|source-watch|watch/.test(txt) || o.status === 'source-watch' || o.status === 'SOURCE_WATCH';
            return (FAKE_EVENT_RE.test(txt) || (dated && sourceWatch) || (dated && GENERIC_EVENT_RE.test(txt)));
          }
          function filterArrays(node, path, report){
            if(!node || typeof node !== 'object') return;
            if(Array.isArray(node)){
              for(let i=node.length-1;i>=0;i--){
                const item=node[i];
                if(isFakeEvent(item)){
                  report.fakeEventsRemoved.push({ path:`${path}[${i}]`, id:item.id||null, title:item.title||item.label||null, status:item.status||null });
                  node.splice(i,1);
                }
              }
              node.forEach((v,i)=>filterArrays(v,`${path}[${i}]`,report));
              return;
            }
            for(const [k,v] of Object.entries(node)) filterArrays(v,`${path}.${k}`,report);
          }
          function dedupeSameIdInArray(arr, path, report){
            if(!Array.isArray(arr)) return;
            const seen = new Set();
            for(let i=arr.length-1;i>=0;i--){
              const item = arr[i];
              if(!item || typeof item !== 'object') continue;
              const id = String(item.id || item.slug || '').trim();
              if(!id) continue;
              if(seen.has(id)){
                report.profileDuplicatesRemoved.push({ path:`${path}[${i}]`, id, name:item.canonicalName||item.name||null, reason:'duplicate_id_within_array' });
                arr.splice(i,1);
              } else seen.add(id);
            }
          }
          function applyProfileRepairs(data, report){
            const grossi = TARGETS.find(t=>t.key==='rafael_grossi');
            for(const name of Object.keys(data)){
              const arr = data[name];
              if(Array.isArray(arr)) dedupeSameIdInArray(arr, `data.${name}`, report);
            }
            for(const collection of PROFILE_ARRAYS){
              const arr = Array.isArray(data[collection]) ? data[collection] : [];
              for(let i=arr.length-1;i>=0;i--){
                const item = arr[i];
                if(!isProfileLike(item)) continue;
                if(grossi && matchesTarget(item,grossi) && HELPER_PROFILE_ARRAYS.includes(collection)){
                  report.profileDuplicatesRemoved.push({ path:`data.${collection}[${i}]`, id:item.id||null, name:item.canonicalName||item.name||null, reason:'grossi_helper_collection_suppressed' });
                  arr.splice(i,1);
                }
              }
            }
            let grossiVisibleKept = false;
            walk(data,(obj,path)=>{
              if(!isProfileLike(obj)) return;
              for(const target of TARGETS){
                if(!matchesTarget(obj,target)) continue;
                let visible = true;
                if(target.key === 'rafael_grossi'){
                  const inRoster = /data\.roster\[/.test(path);
                  const inPeople = /data\.people\[/.test(path);
                  if(!grossiVisibleKept && inRoster){ grossiVisibleKept = true; visible = true; }
                  else if(!grossiVisibleKept && inPeople){ visible = false; }
                  else if(!inRoster){ visible = false; }
                }
                patchProfile(obj,target,report,path,visible);
                break;
              }
            });
          }
          function findPersonId(data, names){
            const pools = ['people','roster','topRoster','expansionRoster'];
            for(const p of pools){
              for(const item of Array.isArray(data[p]) ? data[p] : []){
                const t = textOf(item);
                if(names.some(n=>t.includes(norm(n)))) return item.id || item.slug;
              }
            }
            return null;
          }
          function sourcePack(url,label){ return [{ url, label, type:'official', reliability:'official-primary', checkedAt:NOW }]; }
          function makeEvent(id, personId, title, startsAt, city, countryCode, countryName, lat, lng, url, summary){
            return { id, personId, startsAt, endsAt:null, status:'VERIFIED_PUBLIC', confidence:0.95, confidenceLabel:'official source', eventType:'PUBLIC_APPEARANCE', title, summary:summary||title, significance:'Official-source public event.', decisions:'', location:{ label:city, city, countryCode, countryName, lat, lng, precision:'city', type:'public_city' }, venuePublic:true, securityPrecision:'city-level public event only', publicInterestScore:80, eventGroupId:`eg-${id}`, topics:['official-source'], counterpartIds:[], sourcePack:sourcePack(url,'official source'), visual:{status:'runtime portrait'}, lastCheckedAt:NOW, marketImpact:{sectors:[],companies:[],countries:[countryName],confidence:'medium'}, realEvent:true };
          }
          function addOfficialEvents(data, report){
            const grossiId = findPersonId(data,['rafael grossi']);
            const popeId = findPersonId(data,['pope leo xiv','pope']);
            const kingId = findPersonId(data,['king charles iii','charles iii']);
            const seeds = [];
            if(grossiId) seeds.push(makeEvent('official-iaea-grossi-bog-vienna-2026-03-02', grossiId, 'IAEA Board of Governors statement', '2026-03-02T09:00:00Z', 'Vienna', 'AT', 'Austria', 48.2082, 16.3738, 'https://www.iaea.org/newscenter/statements/iaea-director-generals-introductory-statement-to-the-board-of-governors-2-6-march-2026', 'Rafael Grossi at the IAEA Board of Governors in Vienna.'));
            if(popeId) seeds.push(makeEvent('official-vatican-pope-leo-xiv-spain-2026-06-06', popeId, 'Pope Leo XIV apostolic journey to Spain', '2026-06-06T09:00:00Z', 'Madrid', 'ES', 'Spain', 40.4168, -3.7038, 'https://www.vatican.va/content/leo-xiv/en/travels/2026/documents/spagna-6-12giugno2026.html', 'Vatican-published itinerary for Pope Leo XIV in Spain.'));
            if(kingId) seeds.push(makeEvent('official-royal-king-charles-washington-congress-2026-04-28', kingId, 'The King address to Congress in Washington', '2026-04-28T12:00:00Z', 'Washington', 'US', 'United States', 38.9072, -77.0369, 'https://www.royal.uk/news-and-activity/2026-04-28/the-kings-address-to-the-joint-meeting-of-congress-in-washington', 'Royal Family official record of the King in Washington.'));
            data.appearances = Array.isArray(data.appearances) ? data.appearances : [];
            const ids = new Set(data.appearances.map(x=>x && x.id));
            for(const ev of seeds){ if(!ids.has(ev.id)){ data.appearances.push(ev); report.officialEventsAdded.push({ id:ev.id, title:ev.title, personId:ev.personId }); } }
          }
          function collectAdsenseFromText(text, found){
            for(const m of String(text||'').matchAll(/ca-pub-[0-9]{10,}/g)) found.clients.add(m[0]);
            for(const m of String(text||'').matchAll(/pub-[0-9]{10,}/g)) found.publishers.add(m[0]);
            for(const m of String(text||'').matchAll(/data-ad-slot=["']([^"']{3,})["']/g)) found.slots.add(m[1]);
          }
          function findAdsense(){
            const found = { clients:new Set(), publishers:new Set(), slots:new Set() };
            const files = ['index.html','ads.txt','index.template.html','privacy.html','impressum.html','data/demo.json'];
            for(const f of files) collectAdsenseFromText(read(f),found);
            let grep = '';
            try { grep = sh("git grep -I -h -E 'ca-pub-|data-ad-slot|pub-[0-9]' $(git rev-list --all) -- '*.html' '*.txt' '*.json' 2>/dev/null || true"); } catch {}
            collectAdsenseFromText(grep,found);
            const client = [...found.clients][0] || '';
            const publisher = client ? client.replace(/^ca-/,'') : ([...found.publishers][0] || '');
            const slots = [...found.slots].filter(Boolean);
            return { client, publisherId:publisher, headerSlot:slots[0]||'', sidebarSlot:slots.find(s=>s!==slots[0])||slots[1]||'' };
          }
          function ensureHead(html, snippet, marker){
            if(html.includes(marker)) return html;
            if(/<\/head>/i.test(html)) return html.replace(/<\/head>/i, snippet + '\n</head>');
            return snippet + '\n' + html;
          }
          function installAdsense(report){
            let html = read(INDEX);
            const ids = findAdsense();
            report.adsense = { ...ids, status: ids.client && ids.headerSlot && ids.sidebarSlot ? 'adsense_preserved_and_audited' : 'adsense_ids_not_found_no_fake_ids_injected' };
            if(ids.client){
              html = ensureHead(html, `<meta name="google-adsense-account" content="${ids.client}">`, 'google-adsense-account');
              html = ensureHead(html, `<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${ids.client}" crossorigin="anonymous"></script>`, 'pagead2.googlesyndication.com/pagead/js/adsbygoogle.js');
              fs.writeFileSync(INDEX, html);
              if(ids.publisherId) fs.writeFileSync('ads.txt', `google.com, ${ids.publisherId}, DIRECT, f08c47fec0942fa0\n`);
            }
            const privacy = '<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Privacy Policy - ParleyMap</title><meta name="viewport" content="width=device-width,initial-scale=1"></head><body><main><h1>Privacy Policy</h1><p>ParleyMap uses public-source information to map public appearances and institutional events. It does not publish private addresses, private residences, hotels, hospitals, leaked itineraries or live routes.</p><p>The site may use essential storage for preferences and, where accepted, analytics or advertising services such as Google AdSense.</p><p>Contact: contact@parleymap.com</p></main></body></html>\n';
            const impressum = '<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Impressum - ParleyMap</title><meta name="viewport" content="width=device-width,initial-scale=1"></head><body><main><h1>Impressum</h1><p>ParleyMap is a public-source presence intelligence project.</p><p>Contact: contact@parleymap.com</p></main></body></html>\n';
            if(!/<html/i.test(read('privacy.html')) || /index\.html|workflow|build/i.test(read('privacy.html'))) fs.writeFileSync('privacy.html', privacy);
            if(!/<html/i.test(read('impressum.html')) || /index\.html|workflow|build/i.test(read('impressum.html'))) fs.writeFileSync('impressum.html', impressum);
            if(!fs.existsSync('about.html')) fs.writeFileSync('about.html','<!doctype html><html><head><meta charset="utf-8"><title>About ParleyMap</title></head><body><main><h1>About ParleyMap</h1><p>ParleyMap tracks public appearances, official meetings and institutionally sourced events at city-level precision.</p></main></body></html>\n');
            if(!fs.existsSync('methodology.html')) fs.writeFileSync('methodology.html','<!doctype html><html><head><meta charset="utf-8"><title>Methodology</title></head><body><main><h1>Methodology</h1><p>Records are sourced from official or host-public sources and filtered to avoid private movement tracking.</p></main></body></html>\n');
            if(!fs.existsSync('data-sources.html')) fs.writeFileSync('data-sources.html','<!doctype html><html><head><meta charset="utf-8"><title>Data Sources</title></head><body><main><h1>Data Sources</h1><p>Sources include official government, institutional, Vatican, IAEA, royal and multilateral public pages.</p></main></body></html>\n');
            if(!fs.existsSync('contact.html')) fs.writeFileSync('contact.html','<!doctype html><html><head><meta charset="utf-8"><title>Contact</title></head><body><main><h1>Contact</h1><p>contact@parleymap.com</p></main></body></html>\n');
          }
          function installRuntimeGuard(){
            let html = read(INDEX);
            const guardId = 'parleymap-canonical-runtime-guard';
            const guard = `<script id="${guardId}">(function(){var A={grossi:{lat:48.2082,lng:16.3738,city:'Vienna'},pope:{lat:41.9029,lng:12.4534,city:'Vatican City'},sheinbaum:{lat:19.4326,lng:-99.1332,city:'Mexico City'},subianto:{lat:-6.2088,lng:106.8456,city:'Jakarta'}};function key(s){s=String(s||'').toLowerCase();if(s.includes('grossi'))return'grossi';if(s.includes('pope')||s.includes('leo xiv'))return'pope';if(s.includes('sheinbaum'))return'sheinbaum';if(s.includes('subianto')||s.includes('prabowo'))return'subianto';return''}function patch(){if(!window.L||!L.marker||L.marker.__pmCanonicalGuard){setTimeout(patch,200);return}var orig=L.marker,seen={};L.marker=function(latlng,opt){var txt='';try{txt=JSON.stringify(opt||{})}catch(e){}var k=key(txt);if(k&&A[k]){latlng=[A[k].lat,A[k].lng];seen[k]=(seen[k]||0)+1;if(k==='grossi'&&seen[k]>1){opt=Object.assign({},opt||{},{opacity:0,interactive:false});}}return orig.call(this,latlng,opt)};L.marker.__pmCanonicalGuard=true}patch();setInterval(function(){var seen={};document.querySelectorAll('.leaflet-marker-icon,.leaflet-tooltip,.leaflet-popup').forEach(function(el){var k=key(el.textContent||el.innerHTML||'');if(!k)return;if(k==='grossi'){seen[k]=(seen[k]||0)+1;if(seen[k]>1)el.style.display='none'}})},1000);})();</script>`;
            const re = new RegExp(`<script id=["']${guardId}["'][\\s\\S]*?<\\/script>`,'g');
            html = html.replace(re,'');
            const ex = extract(html);
            if(ex){
              const insertAt = html.indexOf(CLOSE, ex.jsonEnd) + CLOSE.length;
              html = html.slice(0,insertAt) + '\n' + guard + '\n' + html.slice(insertAt);
            } else if(/<\/head>/i.test(html)) html = html.replace(/<\/head>/i, guard+'\n</head>');
            else html = guard+'\n'+html;
            fs.writeFileSync(INDEX, html);
          }
          function visibleGrossiCount(data){
            let c=0;
            for(const k of PROFILE_ARRAYS){
              for(const item of Array.isArray(data[k]) ? data[k] : []){
                if(matchesTarget(item,TARGETS[0]) && item.renderOnMap !== false && item.mapVisible !== false && item.visible !== false) c++;
              }
            }
            return c;
          }
          function audit(data, report){
            const fail=[];
            if(!basicOk(data)) fail.push('core_counts_below_floor');
            const fake=[]; walk(data,(o,p)=>{ if(isFakeEvent(o)) fake.push({path:p,title:o.title||o.label||null}); });
            if(fake.length) fail.push('fake_events_remaining');
            const vg = visibleGrossiCount(data); if(vg !== 1) fail.push('grossi_visible_count_'+vg);
            const checks = [
              ['rafael_grossi','AT','Vienna'],['pope_leo_xiv','VA','Vatican City'],['claudia_sheinbaum','MX','Mexico City'],['prabowo_subianto','ID','Jakarta']
            ];
            for(const [key,code,city] of checks){
              const t = TARGETS.find(x=>x.key===key); let found=0,bad=0;
              walk(data,(o)=>{ if(isProfileLike(o)&&matchesTarget(o,t)){ found++; const txt = JSON.stringify(o).toLowerCase(); if(!txt.includes(city.toLowerCase()) || String(o.countryFocusCode||o.countryCode||'').toUpperCase()!==code) bad++; if(key==='rafael_grossi' && /"countryFocusCode":"IA"|"code":"BI"|BIS/.test(JSON.stringify(o))) bad++; }});
              if(!found) fail.push(key+'_not_found'); if(bad) fail.push(key+'_bad_anchor_'+bad);
            }
            const status = fail.length ? 'audit_failed' : 'audit_passed';
            const auditReport = { generatedAt:NOW, status, failures:fail, fakeEventsRemaining:fake.slice(0,20), grossiVisibleCount:vg, before:report.before, after:report.after };
            fs.writeFileSync(`${DIAG}/canonical-hard-audit-report.json`, JSON.stringify(auditReport,null,2)+'\n');
            if(fail.length) throw new Error('Hard audit failed: '+fail.join(', '));
          }
          function writeScheduledWorkflows(){
            fs.mkdirSync('.github/workflows',{recursive:true});
            fs.writeFileSync('.github/workflows/nightly-refresh.yml', `name: ParleyMap nightly refresh\n\non:\n  workflow_dispatch:\n  schedule:\n    - cron: "19 3 * * *"\n\npermissions:\n  contents: write\n\nconcurrency:\n  group: parleymap-nightly-refresh\n  cancel-in-progress: false\n\njobs:\n  refresh:\n    runs-on: ubuntu-latest\n    timeout-minutes: 15\n    steps:\n      - uses: actions/checkout@v4\n        with:\n          ref: main\n          fetch-depth: 0\n      - uses: actions/setup-node@v4\n        with:\n          node-version: "20"\n      - name: Run canonical maintenance\n        run: node scripts/parleymap-maintenance.cjs\n      - name: Commit maintenance results\n        uses: stefanzweifel/git-auto-commit-action@v5\n        with:\n          commit_message: "Run ParleyMap nightly canonical maintenance"\n          file_pattern: "index.html data/demo.json ads.txt *.html data/diagnostics/*.json data/diagnostics/*.md .github/workflows/*.yml scripts/parleymap-maintenance.cjs"\n`);
            fs.writeFileSync('.github/workflows/monthly-roster-review.yml', `name: ParleyMap monthly roster review\n\non:\n  workflow_dispatch:\n  schedule:\n    - cron: "31 4 1 * *"\n\npermissions:\n  contents: write\n\nconcurrency:\n  group: parleymap-monthly-roster-review\n  cancel-in-progress: false\n\njobs:\n  review:\n    runs-on: ubuntu-latest\n    timeout-minutes: 15\n    steps:\n      - uses: actions/checkout@v4\n        with:\n          ref: main\n          fetch-depth: 0\n      - uses: actions/setup-node@v4\n        with:\n          node-version: "20"\n      - name: Run canonical maintenance and safe roster review\n        run: node scripts/parleymap-maintenance.cjs\n      - name: Commit roster diagnostics\n        uses: stefanzweifel/git-auto-commit-action@v5\n        with:\n          commit_message: "Run ParleyMap monthly safe roster review"\n          file_pattern: "index.html data/demo.json ads.txt *.html data/diagnostics/*.json data/diagnostics/*.md"\n`);
            fs.writeFileSync('.github/workflows/roster-auto-update-now.yml', `name: ParleyMap roster auto update now\n\non:\n  workflow_dispatch:\n\npermissions:\n  contents: read\n\njobs:\n  disabled:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Safety hold\n        run: echo "Roster auto update is disabled. Monthly roster review is diagnostics and maintenance only."\n`);
          }
          function main(){
            fs.mkdirSync(DIAG,{recursive:true});
            const payload = recoverIndex();
            const data = payload.data;
            const report = { generatedAt:NOW, status:'canonical_maintenance_applied', before:{ people:count(data,'people'), roster:count(data,'roster'), expansionRoster:count(data,'expansionRoster'), appearances:count(data,'appearances'), categories:count(data,'categories') }, fakeEventsRemoved:[], profileDuplicatesRemoved:[], anchorRepairs:[], officialEventsAdded:[], adsense:{} };
            filterArrays(data,'data',report);
            applyProfileRepairs(data,report);
            addOfficialEvents(data,report);
            data.meta = { ...(data.meta||{}), lastDataUpdate:NOW, lastCanonicalMaintenance:NOW, canonicalMaintenanceStatus:'repaired anchors, fake events and source registry' };
            report.after = { people:count(data,'people'), roster:count(data,'roster'), expansionRoster:count(data,'expansionRoster'), appearances:count(data,'appearances'), categories:count(data,'categories') };
            if(report.after.people < 80 || report.after.roster < 180 || report.after.expansionRoster < 90 || report.after.appearances < 450) throw new Error('Safety count floor failed after repair');
            replaceDemo(payload,data);
            installRuntimeGuard();
            installAdsense(report);
            const afterPayload = extract(read(INDEX));
            if(!afterPayload || !basicOk(afterPayload.data)) throw new Error('Post-write index extraction failed');
            audit(afterPayload.data, report);
            writeScheduledWorkflows();
            fs.writeFileSync(`${DIAG}/canonical-maintenance-report.json`, JSON.stringify(report,null,2)+'\n');
            fs.writeFileSync(`${DIAG}/adsense-preserve-audit-report.json`, JSON.stringify({ generatedAt:NOW, ...report.adsense },null,2)+'\n');
            fs.writeFileSync(`${DIAG}/LATEST_RUN_SUMMARY.md`, `# ParleyMap canonical maintenance\n\nStatus: ${report.status}\n\nFake events removed: ${report.fakeEventsRemoved.length}\n\nProfile duplicates removed: ${report.profileDuplicatesRemoved.length}\n\nAnchor repairs: ${report.anchorRepairs.length}\n\nOfficial events added: ${report.officialEventsAdded.length}\n\nAdSense status: ${report.adsense.status}\n\nAdSense client: ${report.adsense.client||'not found'}\n\nHeader slot: ${report.adsense.headerSlot||'not found'}\n\nSidebar slot: ${report.adsense.sidebarSlot||'not found'}\n`);
            console.log(JSON.stringify({status:report.status, fakeEventsRemoved:report.fakeEventsRemoved.length, duplicatesRemoved:report.profileDuplicatesRemoved.length, anchorRepairs:report.anchorRepairs.length, officialEventsAdded:report.officialEventsAdded.length, adsense:report.adsense.status}, null, 2));
          }
          main();
          NODE

      - name: Run canonical maintenance repair
        run: node scripts/parleymap-maintenance.cjs

      - name: Validate embedded dataset with existing validator
        run: node scripts/validate-demo-data.mjs

      - name: Show quick summary
        if: always()
        run: |
          cat data/diagnostics/LATEST_RUN_SUMMARY.md || true
          git diff --name-only || true

      - name: Upload repaired files artifact
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-canonical-maintenance-files
          path: |
            index.html
            data/demo.json
            ads.txt
            privacy.html
            impressum.html
            about.html
            contact.html
            methodology.html
            data-sources.html
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit canonical maintenance repair
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Run ParleyMap canonical maintenance repair"
          file_pattern: "index.html data/demo.json ads.txt *.html data/diagnostics/*.json data/diagnostics/*.md .github/workflows/*.yml scripts/parleymap-maintenance.cjs"
