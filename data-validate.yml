name: ParleyMap data validation

on:
  workflow_dispatch:

permissions:
  contents: write

timeout-minutes: 30

jobs:
  canonical-truth-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run canonical truth repair and hard audit
        run: node scripts/parleymap-canonical-truth-fix.cjs

      - name: Validate embedded dataset when validator exists
        run: |
          if [ -f scripts/validate-demo-data.mjs ]; then
            node scripts/validate-demo-data.mjs
          else
            echo "No existing validator found. Canonical truth audit already passed."
          fi

      - name: Append summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Show changed files
        if: always()
        run: git diff --name-only

      - name: Upload repaired files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-canonical-truth-files
          path: |
            index.html
            ads.txt
            privacy.html
            impressum.html
            about.html
            contact.html
            methodology.html
            data-sources.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit canonical truth repair
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Repair ParleyMap canonical data and AdSense surface"
          file_pattern: "index.html ads.txt privacy.html impressum.html about.html contact.html methodology.html data-sources.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
