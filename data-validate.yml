name: ParleyMap data validation

on:
  workflow_dispatch:
    inputs:
      publisher_id:
        description: "Optional AdSense publisher ID, ca-pub-... or pub-... Leave blank to preserve existing ID from current files or git history."
        required: false
        default: ""
      header_slot_id:
        description: "Optional AdSense header slot ID. Leave blank to preserve existing slot from current files or git history."
        required: false
        default: ""
      sidebar_slot_id:
        description: "Optional AdSense sidebar slot ID. Leave blank to preserve existing slot from current files or git history."
        required: false
        default: ""
      require_adsense_ready:
        description: "Fail if AdSense IDs cannot be recovered or supplied."
        required: true
        default: "true"

permissions:
  contents: write

concurrency:
  group: parleymap-data-validation-repair
  cancel-in-progress: false

jobs:
  repair-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Repair data integrity, anchors, faces and fake watch rows
        run: node scripts/parleymap-data-integrity-repair.cjs

      - name: Repair AdSense surface and legal pages without overwriting IDs
        run: node scripts/parleymap-adsense-legal-repair.cjs
        env:
          PARLEYMAP_ADSENSE_PUBLISHER_ID: ${{ github.event.inputs.publisher_id }}
          PARLEYMAP_ADSENSE_HEADER_SLOT_ID: ${{ github.event.inputs.header_slot_id }}
          PARLEYMAP_ADSENSE_SIDEBAR_SLOT_ID: ${{ github.event.inputs.sidebar_slot_id }}
          PARLEYMAP_REQUIRE_ADSENSE_READY: ${{ github.event.inputs.require_adsense_ready }}

      - name: Run existing embedded-data validator if present
        run: |
          if [ -f scripts/validate-demo-data.mjs ]; then
            node scripts/validate-demo-data.mjs
          else
            echo "scripts/validate-demo-data.mjs not present; hard audit reports were already written."
          fi

      - name: Add run summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Changed files:" >> "$GITHUB_STEP_SUMMARY"
          git diff --name-only >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload repaired files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-data-adsense-repair-files
          path: |
            index.html
            ads.txt
            privacy.html
            impressum.html
            contact.html
            about.html
            methodology.html
            data-sources.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit repaired site surface and data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Repair ParleyMap data integrity and AdSense surface"
          file_pattern: "index.html ads.txt privacy.html impressum.html contact.html about.html methodology.html data-sources.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
