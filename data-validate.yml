name: ParleyMap data validation

on:
  workflow_dispatch:
    inputs:
      publisher_id:
        description: "Optional AdSense publisher ID. Use ca-pub-... or pub-... only if auto-recovery fails."
        required: false
        type: string
      header_slot_id:
        description: "Optional AdSense header ad slot ID. Use only if auto-recovery fails."
        required: false
        type: string
      sidebar_slot_id:
        description: "Optional AdSense sidebar ad slot ID. Use only if auto-recovery fails."
        required: false
        type: string
      require_adsense_ready:
        description: "Fail if AdSense IDs and ads.txt cannot be made crawlable."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  repair-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run true final repair and hard audit
        env:
          PARLEYMAP_FIX_MODE: manual-rescue
          REQUIRE_ADSENSE_READY: ${{ inputs.require_adsense_ready }}
          ADSENSE_PUBLISHER_ID: ${{ inputs.publisher_id }}
          ADSENSE_HEADER_SLOT_ID: ${{ inputs.header_slot_id }}
          ADSENSE_SIDEBAR_SLOT_ID: ${{ inputs.sidebar_slot_id }}
        run: node scripts/parleymap-true-final-fix.cjs

      - name: Append run summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload repaired files and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-true-final-files
          path: |
            index.html
            ads.txt
            privacy.html
            impressum.html
            contact.html
            about.html
            methodology.html
            data-sources.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Show changed files
        run: git diff --name-only

      - name: Commit true final repair
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Apply ParleyMap true final repair"
          file_pattern: "index.html ads.txt privacy.html impressum.html contact.html about.html methodology.html data-sources.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
