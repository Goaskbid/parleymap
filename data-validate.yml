name: ParleyMap data validation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Stabilize and audit ParleyMap data
        run: node scripts/parleymap-final-stabilize.mjs

      - name: Build summary
        if: always()
        run: |
          node scripts/parleymap-build-summary.mjs || true
          cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload fixed files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-fixed-files
          path: |
            index.html
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit stabilized data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Stabilize ParleyMap data and remove fake events"
          file_pattern: "index.html data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
