name: ParleyMap data validation

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parleymap-final-safe-repair
  cancel-in-progress: false

jobs:
  repair-validate-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run final safe repair and audit
        run: node scripts/parleymap-final-safe-repair.cjs

      - name: Validate embedded dataset when validator exists
        run: |
          if [ -f scripts/validate-demo-data.mjs ]; then
            node scripts/validate-demo-data.mjs
          else
            echo "validate-demo-data.mjs missing; final safe repair already ran shape audit"
          fi

      - name: Write workflow summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Show changed files
        run: git diff --name-only

      - name: Upload repaired files
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-final-safe-repair-files
          path: |
            index.html
            ads.txt
            data/demo.json
            data/diagnostics/*.json
            data/diagnostics/*.md

      - name: Commit final safe repair
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Repair ParleyMap data integrity and AdSense surface"
          file_pattern: "index.html ads.txt data/demo.json data/diagnostics/*.json data/diagnostics/*.md"
