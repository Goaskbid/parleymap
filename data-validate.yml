name: ParleyMap data validation

on:
  workflow_dispatch:
    inputs:
      publisher_id:
        description: "Optional AdSense publisher ID, ca-pub-... or pub-..."
        required: false
        default: ""
      header_slot_id:
        description: "Optional existing AdSense header ad slot ID"
        required: false
        default: ""
      sidebar_slot_id:
        description: "Optional existing AdSense sidebar ad slot ID"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: parleymap-data-validation-rescue
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run institutional rescue, event audit, and AdSense preservation
        run: node scripts/parleymap-institutional-rescue.cjs
        env:
          PUBLISHER_ID: ${{ github.event.inputs.publisher_id }}
          HEADER_SLOT_ID: ${{ github.event.inputs.header_slot_id }}
          SIDEBAR_SLOT_ID: ${{ github.event.inputs.sidebar_slot_id }}

      - name: Validate embedded dataset if validator exists
        run: |
          if [ -f scripts/validate-demo-data.mjs ]; then
            node scripts/validate-demo-data.mjs
          else
            echo "No legacy validator present; institutional rescue already ran hard audit."
          fi

      - name: Add summary to workflow page
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload repaired files and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-institutional-rescue-files
          path: |
            index.html
            ads.txt
            privacy.html
            impressum.html
            contact.html
            about.html
            methodology.html
            data-sources.html
            data/demo.json
            data/source-registry.json
            data/diagnostics/*.json
            data/diagnostics/*.md
            data/crawler/*.json

      - name: Show changed files
        run: git diff --name-only

      - name: Commit institutional rescue
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Repair ParleyMap institutional anchors and events"
          file_pattern: "index.html ads.txt privacy.html impressum.html contact.html about.html methodology.html data-sources.html data/demo.json data/source-registry.json data/crawler/*.json data/diagnostics/*.json data/diagnostics/*.md"
