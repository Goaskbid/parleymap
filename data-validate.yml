name: ParleyMap data validation

on:
  workflow_dispatch:
    inputs:
      require_adsense_ready:
        description: "Fail if AdSense IDs cannot be recovered"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      publisher_id:
        description: "Optional AdSense publisher ID, ca-pub-... or pub-..."
        required: false
        default: ""
      header_slot_id:
        description: "Optional header ad unit slot ID"
        required: false
        default: ""
      sidebar_slot_id:
        description: "Optional sidebar ad unit slot ID"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: parleymap-canonical-rescue
  cancel-in-progress: false

jobs:
  rescue:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout full repository history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run canonical source-of-truth repair and hard audit
        env:
          REQUIRE_ADSENSE_READY: ${{ inputs.require_adsense_ready }}
          ADSENSE_PUBLISHER_ID: ${{ inputs.publisher_id }}
          ADSENSE_HEADER_SLOT_ID: ${{ inputs.header_slot_id }}
          ADSENSE_SIDEBAR_SLOT_ID: ${{ inputs.sidebar_slot_id }}
        run: node scripts/parleymap-canonical-rescue.cjs

      - name: Run safe roster review diagnostics
        run: node scripts/parleymap-safe-roster-review.cjs

      - name: Show summary
        if: always()
        run: |
          if [ -f data/diagnostics/LATEST_RUN_SUMMARY.md ]; then
            cat data/diagnostics/LATEST_RUN_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
            cat data/diagnostics/LATEST_RUN_SUMMARY.md
          fi

      - name: Upload repaired files and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parleymap-canonical-rescue-files
          path: |
            index.html
            ads.txt
            data/demo.json
            privacy.html
            impressum.html
            about.html
            contact.html
            methodology.html
            data-sources.html
            data/diagnostics/*

      - name: Commit canonical repair
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Repair ParleyMap canonical data and AdSense surface"
          file_pattern: "index.html ads.txt data/demo.json privacy.html impressum.html about.html contact.html methodology.html data-sources.html data/diagnostics/*"
